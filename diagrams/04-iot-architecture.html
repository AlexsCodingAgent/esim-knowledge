<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eSIM IoT Architecture — eIM + IPA</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'JetBrains Mono',monospace;background:#020617;min-height:100vh;padding:2rem;color:white}.container{max-width:1200px;margin:0 auto}.header{margin-bottom:2rem}.header-row{display:flex;align-items:center;gap:1rem;margin-bottom:.5rem}.pulse-dot{width:12px;height:12px;background:#fb923c;border-radius:50%;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}h1{font-size:1.5rem;font-weight:700}.subtitle{color:#94a3b8;font-size:.875rem;margin-left:1.75rem}.diagram-container{background:rgba(15,23,42,.5);border-radius:1rem;border:1px solid #1e293b;padding:1.5rem;overflow-x:auto}svg{width:100%;min-width:1000px;display:block}.footer{text-align:center;margin-top:1.5rem;color:#475569;font-size:.75rem}</style></head>
<body><div class="container">
<div class="header"><div class="header-row"><div class="pulse-dot"></div><h1>eSIM IoT Architecture</h1></div><p class="subtitle">GSMA SGP.32 — eIM, IPA, and New Interfaces for Constrained Devices</p></div>
<div class="diagram-container">
<svg viewBox="0 0 1100 720">
<defs>
<marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/></marker>
<marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/></marker>
<marker id="ao" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/></marker>
<marker id="ay" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/></marker>
<marker id="ac" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/></marker>
<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern>
</defs>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- Operator -->
<rect x="40" y="30" width="140" height="50" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
<text x="110" y="58" fill="white" font-size="11" font-weight="600" text-anchor="middle">Operator</text>

<!-- SM-DP+ -->
<rect x="240" y="30" width="180" height="50" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="330" y="58" fill="white" font-size="11" font-weight="600" text-anchor="middle">SM-DP+</text>

<!-- SM-DS -->
<rect x="480" y="30" width="160" height="50" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
<text x="560" y="58" fill="white" font-size="11" font-weight="600" text-anchor="middle">SM-DS</text>

<!-- eIM -->
<rect x="180" y="260" width="220" height="90" rx="8" fill="rgba(251,146,60,0.35)" stroke="#fb923c" stroke-width="2"/>
<text x="290" y="290" fill="white" font-size="13" font-weight="600" text-anchor="middle">eIM</text>
<text x="290" y="310" fill="#94a3b8" font-size="9" text-anchor="middle">eSIM IoT Remote Manager</text>
<text x="290" y="330" fill="#fb923c" font-size="8" text-anchor="middle">PSMO • eCO • Fleet Control</text>

<!-- ES2+ -->
<line x1="180" y1="55" x2="238" y2="55" stroke="#34d399" stroke-width="1.5" marker-end="url(#ag)"/>
<text x="210" y="47" fill="#34d399" font-size="8">ES2+</text>

<!-- ES9+' -->
<line x1="330" y1="80" x2="290" y2="258" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ag)"/>
<text x="300" y="170" fill="#34d399" font-size="8">ES9+'</text>

<!-- ES12 -->
<line x1="420" y1="55" x2="478" y2="55" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#ay)"/>
<text x="450" y="47" fill="#fbbf24" font-size="8">ES12</text>

<!-- ES11' -->
<line x1="560" y1="80" x2="330" y2="258" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ay)"/>
<text x="430" y="190" fill="#fbbf24" font-size="8">ES11'</text>

<!-- IoT Device container -->
<rect x="520" y="280" width="520" height="280" rx="12" fill="rgba(34,211,238,0.03)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
<text x="540" y="298" fill="#22d3ee" font-size="10" font-weight="600">IoT Device</text>

<!-- IPA -->
<rect x="550" y="315" width="200" height="85" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="650" y="342" fill="white" font-size="12" font-weight="600" text-anchor="middle">IPA (IPAd)</text>
<text x="650" y="360" fill="#94a3b8" font-size="8" text-anchor="middle">IoT Profile Assistant</text>
<text x="650" y="378" fill="#22d3ee" font-size="8" text-anchor="middle">Proxy • Discovery • Notify</text>

<!-- eUICC -->
<rect x="800" y="315" width="220" height="85" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
<text x="910" y="342" fill="white" font-size="12" font-weight="600" text-anchor="middle">eUICC</text>
<text x="910" y="360" fill="#94a3b8" font-size="8" text-anchor="middle">ISD-R • ISD-P × N</text>
<text x="910" y="378" fill="#a78bfa" font-size="8" text-anchor="middle">Verified eUICC Packages</text>

<!-- ESipa -->
<rect x="420" y="340" width="120" height="50" rx="6" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
<text x="480" y="360" fill="#fb923c" font-size="10" font-weight="600" text-anchor="middle">ESipa</text>
<text x="480" y="378" fill="#94a3b8" font-size="7" text-anchor="middle">eIM Package</text>

<!-- ESipa arrows -->
<line x1="400" y1="305" x2="460" y2="338" stroke="#fb923c" stroke-width="1.5" marker-end="url(#ao)"/>
<line x1="480" y1="340" x2="548" y2="340" stroke="#fb923c" stroke-width="1.5" marker-end="url(#ao)"/>

<!-- ESep (logical) -->
<path d="M 290 350 Q 350 440 600 450 Q 750 450 780 380" fill="none" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="540" y="455" fill="#fb923c" font-size="8">ESep (logical, signed eUICC Packages)</text>

<!-- ES11 -->
<line x1="560" y1="80" x2="630" y2="313" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#ay)"/>
<text x="620" y="200" fill="#fbbf24" font-size="7">ES11</text>

<!-- ES8+ -->
<line x1="330" y1="80" x2="780" y2="313" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a)"/>
<text x="600" y="170" fill="#a78bfa" font-size="7">ES8+ (via IPA)</text>

<!-- ES10a/b -->
<line x1="750" y1="357" x2="798" y2="357" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#ac)"/>
<text x="775" y="350" fill="#22d3ee" font-size="8">ES10a/b</text>

<!-- Transport options -->
<rect x="550" y="440" width="455" height="55" rx="8" fill="rgba(30,41,59,0.3)" stroke="#64748b" stroke-width="1"/>
<text x="777" y="462" fill="white" font-size="10" font-weight="600" text-anchor="middle">Transport Options</text>
<text x="777" y="482" fill="#64748b" font-size="8" text-anchor="middle">HTTP/TLS • CoAP/DTLS • MQTT • Non-IP (NIDD) • Proprietary</text>

<!-- IPA Capabilities -->
<rect x="550" y="510" width="455" height="35" rx="6" fill="rgba(34,211,238,0.08)" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="4,2"/>
<text x="777" y="532" fill="#22d3ee" font-size="8" text-anchor="middle">IPA Capabilities: minimizeEsipaBytes • Direct/Indirect Download • Protocol Negotiation</text>

<!-- Legend -->
<text x="40" y="650" fill="white" font-size="10" font-weight="600">What's New in SGP.32 (vs Consumer SGP.22)</text>
<text x="40" y="672" fill="#fb923c" font-size="9">• eIM — Remote fleet manager replaces end-user interaction</text>
<text x="40" y="690" fill="#fb923c" font-size="9">• ESipa — eIM-to-IPA interface with signed eUICC Packages for PSMO/eCO</text>
<text x="40" y="708" fill="#fb923c" font-size="9">• ESep — Logical end-to-end signing between eIM and eUICC</text>
<text x="520" y="672" fill="#fb923c" font-size="9">• ES9+' — eIM-to-SM-DP+ (Indirect Download)</text>
<text x="520" y="690" fill="#fb923c" font-size="9">• ES11' — eIM-to-SM-DS (offloaded SM-DS polling)</text>
<text x="520" y="708" fill="#fb923c" font-size="9">• No ES10c — No local UI-driven profile management</text>

</svg></div>
<p class="footer">Based on GSMA SGP.32 v1.3 — Sections 2.1-2.3 and SGP.31 v1.3 Section 4</p>
</div></body></html>

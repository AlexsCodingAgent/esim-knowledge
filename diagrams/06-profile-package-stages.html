<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eSIM Profile Package Stages</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'JetBrains Mono',monospace;background:#020617;min-height:100vh;padding:2rem;color:white}.container{max-width:1100px;margin:0 auto}.header{margin-bottom:2rem}.header-row{display:flex;align-items:center;gap:1rem;margin-bottom:.5rem}.pulse-dot{width:12px;height:12px;background:#fbbf24;border-radius:50%;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}h1{font-size:1.5rem;font-weight:700}.subtitle{color:#94a3b8;font-size:.875rem;margin-left:1.75rem}.diagram-container{background:rgba(15,23,42,.5);border-radius:1rem;border:1px solid #1e293b;padding:1.5rem;overflow-x:auto}svg{width:100%;min-width:1000px;display:block}.footer{text-align:center;margin-top:1.5rem;color:#475569;font-size:.75rem}</style></head>
<body><div class="container">
<div class="header"><div class="header-row"><div class="pulse-dot"></div><h1>eSIM Profile Package Stages</h1></div><p class="subtitle">GSMA SGP.22 — From Operator Profile to Installed eUICC Profile</p></div>
<div class="diagram-container">
<svg viewBox="0 0 1050 580">
<defs>
<marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/></marker>
<marker id="ac" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/></marker>
<marker id="av" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/></marker>
<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern>
</defs>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- Title areas -->
<text x="520" y="30" fill="white" font-size="13" font-weight="600" text-anchor="middle">SM-DP+ (Server Side)</text>
<text x="520" y="50" fill="#94a3b8" font-size="9" text-anchor="middle">Profile Factory → Encrypt → Bind</text>
<line x1="30" y1="60" x2="1010" y2="60" stroke="#1e293b" stroke-width="1"/>

<!-- Stage 1: UPP -->
<rect x="40" y="80" width="200" height="110" rx="8" fill="rgba(30,41,59,0.4)" stroke="#94a3b8" stroke-width="1.5"/>
<text x="140" y="108" fill="white" font-size="12" font-weight="600" text-anchor="middle">1. UPP</text>
<text x="140" y="128" fill="#94a3b8" font-size="9" text-anchor="middle">Unprotected</text>
<text x="140" y="146" fill="#94a3b8" font-size="9" text-anchor="middle">Profile Package</text>
<line x1="60" y1="158" x2="220" y2="158" stroke="#475569" stroke-width="0.5"/>
<text x="140" y="176" fill="#64748b" font-size="8" text-anchor="middle">SIMalliance TLV seq.</text>

<line x1="240" y1="135" x2="285" y2="135" stroke="#fbbf24" stroke-width="2" marker-end="url(#a)"/>

<!-- Stage 2: PPP -->
<rect x="290" y="80" width="200" height="110" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
<text x="390" y="108" fill="white" font-size="12" font-weight="600" text-anchor="middle">2. PPP</text>
<text x="390" y="128" fill="#94a3b8" font-size="9" text-anchor="middle">Protected</text>
<text x="390" y="146" fill="#94a3b8" font-size="9" text-anchor="middle">Profile Package</text>
<line x1="310" y1="158" x2="470" y2="158" stroke="#475569" stroke-width="0.5"/>
<text x="390" y="176" fill="#fbbf24" font-size="8" text-anchor="middle">SCP03t encrypted</text>

<line x1="490" y1="135" x2="535" y2="135" stroke="#fbbf24" stroke-width="2" marker-end="url(#a)"/>

<!-- Stage 3: BPP -->
<rect x="540" y="80" width="240" height="110" rx="8" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="2"/>
<text x="660" y="108" fill="white" font-size="12" font-weight="600" text-anchor="middle">3. BPP</text>
<text x="660" y="128" fill="#94a3b8" font-size="9" text-anchor="middle">Bound</text>
<text x="660" y="146" fill="#94a3b8" font-size="9" text-anchor="middle">Profile Package</text>
<line x1="560" y1="158" x2="760" y2="158" stroke="#475569" stroke-width="0.5"/>
<text x="660" y="174" fill="#34d399" font-size="8" text-anchor="middle">PPP + Key Agreement</text>
<text x="660" y="188" fill="#34d399" font-size="8" text-anchor="middle">+ ISD-P creation + Metadata</text>

<!-- BPP → eUICC label -->
<text x="780" y="135" fill="#22d3ee" font-size="10" font-weight="600">→</text>

<!-- Stage 3b: BPP structure detail (below) -->
<rect x="40" y="230" width="970" height="160" rx="8" fill="rgba(6,78,59,0.08)" stroke="#34d399" stroke-width="1" stroke-dasharray="6,3"/>
<text x="60" y="252" fill="#34d399" font-size="10" font-weight="600">BPP Structure (ASN.1 TLV)</text>

<!-- BPP sub-blocks -->
<rect x="60" y="268" width="170" height="55" rx="6" fill="rgba(136,19,55,0.25)" stroke="#fb7185" stroke-width="1"/>
<text x="145" y="290" fill="white" font-size="9" font-weight="600" text-anchor="middle">InitialiseSecureChannel</text>
<text x="145" y="306" fill="#fb7185" font-size="7" text-anchor="middle">Tag BF23 • ECDH Key Agree</text>
<text x="145" y="318" fill="#475569" font-size="7" text-anchor="middle">Clear (not encrypted)</text>

<text x="245" y="298" fill="#34d399" font-size="12">→</text>

<rect x="265" y="268" width="150" height="55" rx="6" fill="rgba(8,51,68,0.35)" stroke="#22d3ee" stroke-width="1"/>
<text x="340" y="290" fill="white" font-size="9" font-weight="600" text-anchor="middle">ConfigureISDP</text>
<text x="340" y="306" fill="#22d3ee" font-size="7" text-anchor="middle">Tag 87 • Create ISD-P</text>
<text x="340" y="318" fill="#475569" font-size="7" text-anchor="middle">SCP03t encrypted</text>

<text x="430" y="298" fill="#34d399" font-size="12">→</text>

<rect x="450" y="268" width="140" height="55" rx="6" fill="rgba(8,51,68,0.35)" stroke="#22d3ee" stroke-width="1"/>
<text x="520" y="290" fill="white" font-size="9" font-weight="600" text-anchor="middle">StoreMetadata</text>
<text x="520" y="306" fill="#22d3ee" font-size="7" text-anchor="middle">Tag 88 • ICCID, Name</text>
<text x="520" y="318" fill="#475569" font-size="7" text-anchor="middle">MAC only (not enc)</text>

<text x="605" y="298" fill="#34d399" font-size="12">→</text>

<rect x="625" y="268" width="100" height="55" rx="6" fill="rgba(120,53,15,0.25)" stroke="#fbbf24" stroke-width="1"/>
<text x="675" y="288" fill="white" font-size="8" font-weight="600" text-anchor="middle">Profile Prot.</text>
<text x="675" y="302" fill="#fbbf24" font-size="7" text-anchor="middle">Keys (opt)</text>
<text x="675" y="318" fill="#475569" font-size="7" text-anchor="middle">Tag 87</text>

<text x="740" y="298" fill="#34d399" font-size="12">→</text>

<rect x="760" y="268" width="230" height="55" rx="6" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1.5"/>
<text x="875" y="290" fill="white" font-size="9" font-weight="600" text-anchor="middle">Profile Elements</text>
<text x="875" y="306" fill="#a78bfa" font-size="7" text-anchor="middle">Tags 86 (SCP03t payload)</text>
<text x="875" y="318" fill="#475569" font-size="7" text-anchor="middle">FS • NAAs • Applets • Keys</text>

<!-- Stage 4: SBPP (on-device) -->
<text x="520" y="418" fill="#94a3b8" font-size="9" text-anchor="middle">On the IoT Device / Phone</text>
<line x1="30" y1="428" x2="1010" y2="428" stroke="#1e293b" stroke-width="1"/>

<rect x="40" y="445" width="260" height="55" rx="8" fill="rgba(8,51,68,0.25)" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="170" y="470" fill="white" font-size="12" font-weight="600" text-anchor="middle">4. SBPP</text>
<text x="170" y="488" fill="#22d3ee" font-size="9" text-anchor="middle">Segmented Bound Profile Package</text>

<text x="315" y="475" fill="#22d3ee" font-size="12">→</text>

<rect x="335" y="445" width="350" height="55" rx="8" fill="rgba(76,29,149,0.2)" stroke="#a78bfa" stroke-width="1.5"/>
<text x="510" y="470" fill="white" font-size="11" font-weight="600" text-anchor="middle">eUICC → Profile Package Interpreter</text>
<text x="510" y="488" fill="#a78bfa" font-size="8" text-anchor="middle">STORE DATA APDU scripts → Decode → Install</text>

<text x="700" y="475" fill="#a78bfa" font-size="12">→</text>

<rect x="720" y="445" width="280" height="55" rx="8" fill="rgba(34,211,238,0.2)" stroke="#22d3ee" stroke-width="2"/>
<text x="860" y="470" fill="white" font-size="12" font-weight="600" text-anchor="middle">Profile Installed ✓</text>
<text x="860" y="488" fill="#22d3ee" font-size="9" text-anchor="middle">Disabled state → Ready to Enable</text>

<!-- Key properties -->
<rect x="40" y="520" width="970" height="45" rx="6" fill="rgba(136,19,55,0.08)" stroke="#fb7185" stroke-width="0.8" stroke-dasharray="4,2"/>
<text x="520" y="540" fill="#fb7185" font-size="9" text-anchor="middle">BPP is cryptographically bound to a specific eUICC via ECDH key agreement — cannot be installed on any other chip</text>
<text x="520" y="556" fill="#64748b" font-size="8" text-anchor="middle">Profile can be pre-generated (dual-layer protection) or generated on-demand (single-layer, session-key protected)</text>

</svg></div>
<p class="footer">Based on GSMA SGP.22 v2.2.2 — Section 2.5 Profile Protection and Delivery</p>
</div></body></html>

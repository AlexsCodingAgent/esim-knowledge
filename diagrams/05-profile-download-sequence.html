<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eSIM Profile Download Sequence</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'JetBrains Mono',monospace;background:#020617;min-height:100vh;padding:2rem;color:white}.container{max-width:1100px;margin:0 auto}.header{margin-bottom:2rem}.header-row{display:flex;align-items:center;gap:1rem;margin-bottom:.5rem}.pulse-dot{width:12px;height:12px;background:#34d399;border-radius:50%;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}h1{font-size:1.5rem;font-weight:700}.subtitle{color:#94a3b8;font-size:.875rem;margin-left:1.75rem}.diagram-container{background:rgba(15,23,42,.5);border-radius:1rem;border:1px solid #1e293b;padding:1.5rem;overflow-x:auto}svg{width:100%;min-width:1000px;display:block}.footer{text-align:center;margin-top:1.5rem;color:#475569;font-size:.75rem}</style></head>
<body><div class="container">
<div class="header"><div class="header-row"><div class="pulse-dot"></div><h1>eSIM Profile Download Sequence</h1></div><p class="subtitle">GSMA SGP.22 — Three-Phase Flow: Initiation → Mutual Authentication → Installation</p></div>
<div class="diagram-container">
<svg viewBox="0 0 1050 700">
<defs>
<marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/></marker>
<marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/></marker>
<marker id="ac" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/></marker>
<marker id="av" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/></marker>
<marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/></marker>
<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern>
</defs>
<rect width="100%" height="100%" fill="url(#grid)"/>

<!-- Column headers -->
<text x="180" y="30" fill="white" font-size="11" font-weight="600" text-anchor="middle">End User</text>
<text x="380" y="30" fill="white" font-size="11" font-weight="600" text-anchor="middle">Operator</text>
<text x="580" y="30" fill="white" font-size="11" font-weight="600" text-anchor="middle">SM-DP+</text>
<text x="780" y="30" fill="white" font-size="11" font-weight="600" text-anchor="middle">LPA + eUICC</text>
<text x="990" y="30" fill="white" font-size="11" font-weight="600" text-anchor="middle">SM-DS</text>

<!-- Vertical lifelines -->
<line x1="180" y1="45" x2="180" y2="670" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
<line x1="380" y1="45" x2="380" y2="670" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
<line x1="580" y1="45" x2="580" y2="670" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
<line x1="780" y1="45" x2="780" y2="670" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
<line x1="990" y1="45" x2="990" y2="670" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>

<!-- PHASE 1: Initiation -->
<rect x="30" y="55" width="160" height="22" rx="4" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="1"/>
<text x="110" y="70" fill="#fb7185" font-size="10" font-weight="600" text-anchor="middle">Phase 1: Initiation</text>

<!-- Step 1: Subscribe -->
<line x1="180" y1="95" x2="378" y2="95" stroke="#94a3b8" stroke-width="1" marker-end="url(#a)"/>
<text x="280" y="88" fill="#94a3b8" font-size="8" text-anchor="middle">1. Subscribe, provide EID</text>

<!-- Step 2-3: DownloadOrder -->
<line x1="380" y1="115" x2="578" y2="115" stroke="#34d399" stroke-width="1.5" marker-end="url(#ag)"/>
<text x="480" y="108" fill="#34d399" font-size="8" text-anchor="middle">2. ES2+.DownloadOrder</text>
<line x1="580" y1="135" x2="382" y2="135" stroke="#34d399" stroke-width="1" marker-end="url(#ag)"/>
<text x="480" y="148" fill="#34d399" font-size="8" text-anchor="middle">3. ICCID reserved</text>

<!-- Step 4-6: ConfirmOrder -->
<line x1="380" y1="165" x2="578" y2="165" stroke="#34d399" stroke-width="1.5" marker-end="url(#ag)"/>
<text x="480" y="158" fill="#34d399" font-size="8" text-anchor="middle">4. ES2+.ConfirmOrder</text>
<line x1="580" y1="185" x2="990" y2="185" stroke="#fbbf24" stroke-width="1" marker-end="url(#a)"/>
<text x="785" y="178" fill="#fbbf24" font-size="8" text-anchor="middle">5. ES12.RegisterEvent (optional)</text>
<line x1="380" y1="205" x2="182" y2="205" stroke="#94a3b8" stroke-width="1" marker-end="url(#a)"/>
<text x="280" y="218" fill="#94a3b8" font-size="8" text-anchor="middle">6. Activation Code (LPA:1$...)</text>

<!-- PHASE 2: Mutual Auth -->
<rect x="30" y="245" width="160" height="22" rx="4" fill="rgba(34,211,238,0.3)" stroke="#22d3ee" stroke-width="1"/>
<text x="110" y="260" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">Phase 2: Mutual Auth</text>

<!-- Step 7-8: Challenge -->
<rect x="750" y="280" width="60" height="20" rx="3" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="0.8"/>
<text x="780" y="294" fill="#a78bfa" font-size="8" text-anchor="middle">Gen Ch</text>
<line x1="780" y1="310" x2="780" y2="340" stroke="#a78bfa" stroke-width="1" marker-end="url(#av)"/>
<text x="790" y="328" fill="#a78bfa" font-size="8">7. eUICCChallenge</text>

<!-- Step 8-9: InitiateAuth -->
<line x1="780" y1="360" x2="582" y2="360" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#ac)"/>
<text x="680" y="353" fill="#22d3ee" font-size="8" text-anchor="middle">8. ES9+.InitiateAuthentication</text>

<rect x="550" y="375" width="60" height="20" rx="3" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="0.8"/>
<text x="580" y="389" fill="#34d399" font-size="8" text-anchor="middle">Sign</text>

<!-- Step 10: serverSigned1 -->
<line x1="580" y1="405" x2="778" y2="405" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#ac)"/>
<text x="680" y="398" fill="#22d3ee" font-size="8" text-anchor="middle">9. serverSigned1 + signature + CERT.DPauth</text>

<!-- Step 11: AuthenticateServer -->
<text x="730" y="426" fill="#a78bfa" font-size="8">10. ES10b.AuthenticateServer</text>

<rect x="750" y="438" width="60" height="20" rx="3" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="0.8"/>
<text x="780" y="452" fill="#a78bfa" font-size="8" text-anchor="middle">Verify</text>

<!-- Step 12: euiccSigned1 -->
<rect x="750" y="470" width="60" height="20" rx="3" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="0.8"/>
<text x="780" y="484" fill="#a78bfa" font-size="8" text-anchor="middle">Sign</text>
<line x1="780" y1="500" x2="582" y2="500" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#ac)"/>
<text x="680" y="493" fill="#22d3ee" font-size="8" text-anchor="middle">11. euiccSigned1 + CERT.EUICC</text>

<rect x="550" y="515" width="60" height="20" rx="3" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="0.8"/>
<text x="580" y="529" fill="#34d399" font-size="8" text-anchor="middle">Verify</text>

<text x="680" y="555" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">✓ Mutual Authentication Complete</text>

<!-- PHASE 3: Installation -->
<rect x="30" y="580" width="160" height="22" rx="4" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1"/>
<text x="110" y="595" fill="#34d399" font-size="10" font-weight="600" text-anchor="middle">Phase 3: Install</text>

<!-- ES8+ steps -->
<line x1="580" y1="610" x2="778" y2="610" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#av)"/>
<text x="680" y="603" fill="#a78bfa" font-size="8" text-anchor="middle">12. ES8+.InitialiseSecureChannel (ECDH key agree)</text>
<line x1="580" y1="630" x2="778" y2="630" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#av)"/>
<text x="680" y="623" fill="#a78bfa" font-size="8" text-anchor="middle">13. ES8+.ConfigureISDP (create ISD-P)</text>
<line x1="580" y1="650" x2="778" y2="650" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#av)"/>
<text x="680" y="643" fill="#a78bfa" font-size="8" text-anchor="middle">14. ES8+.StoreMetadata → LoadProfileElements…</text>

<rect x="750" y="660" width="60" height="25" rx="4" fill="rgba(34,211,238,0.25)" stroke="#22d3ee" stroke-width="1"/>
<text x="780" y="676" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">Profile</text>
<text x="780" y="689" fill="#94a3b8" font-size="7" text-anchor="middle">Installed</text>

</svg></div>
<p class="footer">Based on GSMA SGP.22 v2.2.2 — Section 3.1 Profile Download and Installation</p>
</div></body></html>

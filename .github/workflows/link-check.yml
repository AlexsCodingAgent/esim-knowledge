name: Link Check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install dependencies
        run: |
          gem install jekyll jekyll-theme-midnight html-proofer --no-document

      - name: Build site
        run: |
          jekyll build --baseurl /esim-knowledge

      - name: Check links
        run: |
          htmlproofer _site \
            --disable-external \
            --allow-hash-href \
            --empty-alt-ignore \
            --assume-extension \
            --file-ignore "/docs/articles/kids/storybook/"

      - name: Check external links (optional, failure non-blocking)
        continue-on-error: true
        run: |
          htmlproofer _site \
            --internal-domains alexscodingagent.github.io \
            --external-only \
            --allow-hash-href \
            --empty-alt-ignore \
            --assume-extension \
            --http-status-ignore 429,503 \
            --timeframe 7d \
            --file-ignore "/docs/articles/kids/storybook/" || echo "External check completed with failures"

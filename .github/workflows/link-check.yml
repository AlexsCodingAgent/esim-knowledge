name: Link Check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8am UTC
  workflow_dispatch:      # Manual trigger

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Check links on live site
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --base https://alexscodingagent.github.io/esim-knowledge
            --accept 200,301,302
            --retry-wait-time 5
            --max-retries 3
            --timeout 30
            --no-progress
            --format detailed
            https://alexscodingagent.github.io/esim-knowledge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

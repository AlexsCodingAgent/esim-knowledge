    89|<text x="175" y="468" fill="white" font-size="10" font-weight="600" text-anchor="middle">EnableProfile</text>
    90|<text x="175" y="484" fill="#94a3b8" font-size="8" text-anchor="middle">Disabled → Enabled</text>
    91|
    92|<rect x="340" y="450" width="290" height="42" rx="6" fill="rgba(76,29,149,0.2)" stroke="#a78bfa" stroke-width="1"/>
    93|<text x="485" y="468" fill="white" font-size="10" font-weight="600" text-anchor="middle">DisableProfile</text>
    94|<text x="485" y="484" fill="#94a3b8" font-size="8" text-anchor="middle">Enabled → Disabled</text>
    95|
    96|<rect x="650" y="450" width="290" height="42" rx="6" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="1"/>
    97|<text x="795" y="468" fill="white" font-size="10" font-weight="600" text-anchor="middle">DeleteProfile</text>
    98|<text x="795" y="484" fill="#94a3b8" font-size="8" text-anchor="middle">Disabled → Removed</text>

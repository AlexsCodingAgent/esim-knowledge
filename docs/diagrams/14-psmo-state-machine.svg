    12|<text x="500" y="28" fill="white" font-size="14" font-weight="600" text-anchor="middle">Profile State Management via PSMO (SGP.32)</text>
    13|
    14|<!-- ===== PSMO FLOW ===== -->
    15|<rect x="30" y="42" width="300" height="22" rx="4" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1"/>
    16|<text x="180" y="57" fill="#fb923c" font-size="10" font-weight="600" text-anchor="middle">PSMO Execution Flow</text>
    17|
    18|<!-- Flow boxes -->
    19|<rect x="40" y="80" width="170" height="40" rx="6" fill="rgba(251,146,60,0.35)" stroke="#fb923c" stroke-width="1.5"/>
    20|<text x="125" y="98" fill="white" font-size="10" font-weight="600" text-anchor="middle">eIM signs PSMO</text>
    21|<text x="125" y="112" fill="#94a3b8" font-size="7" text-anchor="middle">SK.EIM.ECDSA</text>
    22|
    23|<text x="225" y="100" fill="#fb923c" font-size="14">→</text>
    24|
    25|<rect x="250" y="80" width="170" height="40" rx="6" fill="rgba(8,51,68,0.35)" stroke="#22d3ee" stroke-width="1.5"/>
    26|<text x="335" y="98" fill="white" font-size="10" font-weight="600" text-anchor="middle">IPA delivers</text>
    27|<text x="335" y="112" fill="#94a3b8" font-size="7" text-anchor="middle">ES10b.LoadEuiccPackage</text>
    28|
    29|<text x="435" y="100" fill="#22d3ee" font-size="14">→</text>
    30|
    31|<rect x="460" y="80" width="170" height="40" rx="6" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
    32|<text x="545" y="98" fill="white" font-size="10" font-weight="600" text-anchor="middle">eUICC verifies</text>
    33|<text x="545" y="112" fill="#94a3b8" font-size="7" text-anchor="middle">eIM signature + counter</text>
    34|
    35|<text x="645" y="100" fill="#a78bfa" font-size="14">→</text>
    36|
    37|<rect x="670" y="80" width="170" height="40" rx="6" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5"/>
    38|<text x="755" y="98" fill="white" font-size="10" font-weight="600" text-anchor="middle">eUICC executes</text>
    39|<text x="755" y="112" fill="#94a3b8" font-size="7" text-anchor="middle">+ signs result</text>
    40|
    41|<text x="855" y="100" fill="#34d399" font-size="14">→</text>
    42|

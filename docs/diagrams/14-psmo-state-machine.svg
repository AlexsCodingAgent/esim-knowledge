    46|<!-- ===== STATE MACHINE ===== -->
    47|<rect x="30" y="150" width="250" height="22" rx="4" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1"/>
    48|<text x="155" y="165" fill="#a78bfa" font-size="10" font-weight="600" text-anchor="middle">Profile State Machine</text>
    49|
    50|<!-- Disabled state -->
    51|<rect x="100" y="195" width="200" height="70" rx="10" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="2"/>
    52|<text x="200" y="222" fill="white" font-size="13" font-weight="600" text-anchor="middle">DISABLED</text>
    53|<text x="200" y="242" fill="#94a3b8" font-size="9" text-anchor="middle">Profile installed, inactive</text>
    54|
    55|<!-- Enabled state -->
    56|<rect x="420" y="195" width="200" height="70" rx="10" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="2"/>
    57|<text x="520" y="222" fill="white" font-size="13" font-weight="600" text-anchor="middle">ENABLED</text>
    58|<text x="520" y="242" fill="#94a3b8" font-size="9" text-anchor="middle">Profile active on network</text>
    59|
    60|<!-- Enable arrow -->
    61|<line x1="300" y1="220" x2="418" y2="215" stroke="#34d399" stroke-width="2"/>
    62|<text x="360" y="208" fill="#34d399" font-size="9">EnableProfile</text>
    63|<text x="360" y="236" fill="#94a3b8" font-size="7" text-anchor="middle">checks PPR+PPE</text>
    64|
    65|<!-- Disable arrow -->
    66|<line x1="420" y1="250" x2="302" y2="245" stroke="#a78bfa" stroke-width="2"/>
    67|<text x="360" y="270" fill="#a78bfa" font-size="9">DisableProfile</text>
    68|<text x="360" y="288" fill="#94a3b8" font-size="7" text-anchor="middle">PPR1 must allow</text>
    69|
    70|<!-- Delete from Disabled -->
    71|<rect x="100" y="330" width="200" height="60" rx="8" fill="rgba(136,19,55,0.25)" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="5,3"/>
    72|<text x="200" y="358" fill="#fb7185" font-size="12" font-weight="600" text-anchor="middle">REMOVED</text>
    73|<text x="200" y="378" fill="#94a3b8" font-size="8" text-anchor="middle">ISD-P deleted</text>
    74|
    75|<line x1="200" y1="265" x2="200" y2="328" stroke="#fb7185" stroke-width="2"/>
    76|<text x="215" y="298" fill="#fb7185" font-size="9">DeleteProfile</text>
    77|<text x="215" y="316" fill="#94a3b8" font-size="7" text-anchor="middle">PPR2 must allow</text>
    78|
    79|<!-- Rollback -->
    80|<path d="M 520 265 Q 520 310 620 310 Q 720 310 720 270" fill="none" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="6,3"/>
    81|<text x="650" y="305" fill="#fb923c" font-size="9">RollbackProfile</text>
    82|<text x="650" y="325" fill="#94a3b8" font-size="7" text-anchor="middle">IPA connectivity loss recovery</text>
    83|
    84|<!-- ===== SIX PSMO TYPES ===== -->
    85|<rect x="30" y="420" width="300" height="22" rx="4" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="1"/>
    86|<text x="180" y="435" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">Six PSMO Types</text>
    87|

    69|    69|<!-- ===== TRUST MODELS SECTION ===== -->
    70|    70|<rect x="30" y="400" width="200" height="22" rx="4" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="1"/>
    71|    71|<text x="130" y="415" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">Device Trust Models</text>
    72|    72|
    73|    73|<!-- Model 1: Full PKI -->
    74|    74|<rect x="80" y="435" width="290" height="130" rx="8" fill="rgba(6,78,59,0.15)" stroke="#34d399" stroke-width="1"/>
    75|    75|<text x="225" y="458" fill="#34d399" font-size="12" font-weight="600" text-anchor="middle">Full PKI Validation</text>
    76|    76|<text x="225" y="476" fill="#94a3b8" font-size="9" text-anchor="middle">Rich Devices (Linux Gateways)</text>
    77|    77|<line x1="110" y1="486" x2="340" y2="486" stroke="#34d399" stroke-width="0.5" opacity="0.3"/>
    78|    78|<text x="225" y="505" fill="#94a3b8" font-size="8" text-anchor="middle">Full TLS stack validates</text>
    79|    79|<text x="225" y="521" fill="#94a3b8" font-size="8" text-anchor="middle">CERT.EIM.TLS against OS trust store</text>
    80|    80|<text x="225" y="537" fill="#94a3b8" font-size="8" text-anchor="middle">No special eUICC config needed</text>
    81|    81|<rect x="160" y="548" width="130" height="10" rx="3" fill="rgba(34,211,238,0.2)"/>
    82|    82|<text x="225" y="556" fill="#22d3ee" font-size="7" text-anchor="middle">TLS/DTLS standard</text>
    83|    83|
    84|    84|<!-- Model 2: Certificate Pinning -->
    85|    85|<rect x="400" y="435" width="290" height="130" rx="8" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1"/>
    86|    86|<text x="545" y="458" fill="#fb923c" font-size="12" font-weight="600" text-anchor="middle">Certificate Pinning</text>
    87|    87|<text x="545" y="476" fill="#94a3b8" font-size="9" text-anchor="middle">Constrained Devices (MCU RTOS)</text>
    88|    88|<line x1="430" y1="486" x2="660" y2="486" stroke="#fb923c" stroke-width="0.5" opacity="0.3"/>
    89|    89|<text x="545" y="505" fill="#94a3b8" font-size="8" text-anchor="middle">IPA stores trustedCertificateTls</text>
    90|    90|<text x="545" y="521" fill="#94a3b8" font-size="8" text-anchor="middle">Pins to specific cert or CA</text>
    91|    91|<text x="545" y="537" fill="#94a3b8" font-size="8" text-anchor="middle">No online CA validation needed</text>
    92|    92|<rect x="475" y="548" width="140" height="10" rx="3" fill="rgba(251,146,60,0.2)"/>
    93|    93|<text x="545" y="556" fill="#fb923c" font-size="7" text-anchor="middle">Most common IoT model</text>
    94|    94|
    95|    95|<!-- Model 3: Raw PK -->
    96|    96|<rect x="720" y="435" width="290" height="130" rx="8" fill="rgba(76,29,149,0.15)" stroke="#a78bfa" stroke-width="1"/>
    97|    97|<text x="865" y="458" fill="#a78bfa" font-size="12" font-weight="600" text-anchor="middle">Raw Public Key (RFC 7250)</text>
    98|    98|<text x="865" y="476" fill="#94a3b8" font-size="9" text-anchor="middle">Ultra-Constrained (Bare-Metal)</text>
    99|    99|<line x1="750" y1="486" x2="980" y2="486" stroke="#a78bfa" stroke-width="0.5" opacity="0.3"/>
   100|   100|<text x="865" y="505" fill="#94a3b8" font-size="8" text-anchor="middle">IPA stores trustedEimPkTls</text>
   101|   101|<text x="865" y="521" fill="#94a3b8" font-size="8" text-anchor="middle">Raw ECDSA public key only</text>

8|<pattern id="g15" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern>
     9|</defs>
    10|<rect width="100%" height="100%" fill="url(#g15)"/>
    11|
    12|<text x="550" y="28" fill="white" font-size="14" font-weight="600" text-anchor="middle">SM-DS Event Retrieval Paths (SGP.32)</text>
    13|
    14|<!-- ===== COMMON: EVENT LIFECYCLE ===== -->
    15|<rect x="30" y="45" width="1040" height="55" rx="8" fill="rgba(30,41,59,0.3)" stroke="#64748b" stroke-width="1"/>
    16|<text x="60" y="68" fill="#94a3b8" font-size="10" font-weight="600">Event Lifecycle:</text>
    17|
    18|<text x="200" y="68" fill="white" font-size="9">SM-DP+ →</text>
    19|<rect x="270" y="55" width="110" height="22" rx="3" fill="rgba(6,78,59,0.3)"/>
    20|<text x="325" y="70" fill="#34d399" font-size="8" text-anchor="middle">RegisterEvent</text>
    21|
    22|<text x="395" y="68" fill="white" font-size="9">→ SM-DS →</text>
    23|<rect x="475" y="55" width="110" height="22" rx="3" fill="rgba(120,53,15,0.3)"/>
    24|<text x="530" y="70" fill="#fbbf24" font-size="8" text-anchor="middle">Store Event Record</text>
    25|
    26|<text x="600" y="68" fill="white" font-size="9">→</text>
    27|<rect x="620" y="55" width="150" height="22" rx="3" fill="rgba(8,51,68,0.3)"/>
    28|<text x="695" y="70" fill="#22d3ee" font-size="8" text-anchor="middle">Retrieve (Path A or B)</text>
    29|
    30|<text x="785" y="68" fill="white" font-size="9">→ Download →</text>
    31|<rect x="880" y="55" width="110" height="22" rx="3" fill="rgba(6,78,59,0.3)"/>
    32|<text x="935" y="70" fill="#34d399" font-size="8" text-anchor="middle">DeleteEvent</text>
    33|
    34|<text x="60" y="88" fill="#64748b" font-size="8">Event Record = { EID, EventID, SM-DP+ Address } — SM-DS only stores pointers, never the profile itself</text>
    35|
    36|<!-- ===== PATH A ===== -->
    37|<rect x="30" y="115" width="500" height="22" rx="4" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="1"/>
    38|<text x="280" y="130" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">Path A: IPA Retrieves from SM-DS (ES11) — IP-Connected Devices</text>
    39|
    40|<!-- Path A nodes -->
    41|<rect x="60" y="155" width="120" height="50" rx="6" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
    42|<text x="120" y="178" fill="white" font-size="10" font-weight="600" text-anchor="middle">eUICC</text>
    43|<text x="120" y="194" fill="#94a3b8" font-size="7" text-anchor="middle">Challenge + Info</text>
    44|
    45|<rect x="260" y="155" width="120" height="50" rx="6" fill="rgba(8,51,68,0.35)" stroke="#22d3ee" stroke-width="1.5"/>
    46|<text x="320" y="178" fill="white" font-size="10" font-weight="600" text-anchor="middle">IPA (IPAd)</text>
    47|<text x="320" y="194" fill="#94a3b8" font-size="7" text-anchor="middle">LPD / LDS</text>
    48|
    49|<rect x="460" y="155" width="120" height="50" rx="6" fill="rgba(120,53,15,0.35)" stroke="#fbbf24" stroke-width="1.5"/>
    50|<text x="520" y="178" fill="white" font-size="10" font-weight="600" text-anchor="middle">SM-DS</text>
    51|<text x="520" y="194" fill="#94a3b8" font-size="7" text-anchor="middle">Event Records</text>
    52|
    53|<!-- Path A arrows -->
    54|<line x1="180" y1="180" x2="258" y2="180" stroke="#a78bfa" stroke-width="1.5"/>
    55|<text x="220" y="172" fill="#a78bfa" font-size="7">ES10b</text>
    56|
    57|<line x1="380" y1="180" x2="458" y2="180" stroke="#22d3ee" stroke-width="2"/>
    58|<text x="420" y="172" fill="#22d3ee" font-size="7">ES11 (TLS)</text>
    59|
    60|<!-- Path A steps -->
    61|<rect x="60" y="225" width="520" height="120" rx="8" fill="rgba(8,51,68,0.05)" stroke="#22d3ee" stroke-width="0.8"/>
    62|<text x="80" y="245" fill="#22d3ee" font-size="9" font-weight="600">Flow:</text>
    63|<text x="80" y="265" fill="#94a3b8" font-size="8">1. IPA → eUICC: GetEuiccConfiguredAddresses (SM-DS address)</text>
    64|<text x="80" y="282" fill="#94a3b8" font-size="8">2. IPA → eUICC: GetEUICCChallenge + GetEUICCInfo</text>
    65|<text x="80" y="299" fill="#94a3b8" font-size="8">3. IPA ↔ SM-DS: ES11 mutual auth (TLS + ECDSA challenge/response)</text>
    66|<text x="80" y="316" fill="#94a3b8" font-size="8">4. IPA → eUICC: AuthenticateServer (eUICC verifies SM-DS certificate)</text>
    67|<text x="80" y="333" fill="#94a3b8" font-size="8">5. SM-DS → IPA: Event Record(s) → IPA initiates Direct Download with SM-DP+</text>
    68|
    69|<!-- ===== PATH B ===== -->
    70|<rect x="570" y="115" width="500" height="22" rx="4" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1"/>
    71|<text x="820" y="130" fill="#fb923c" font-size="10" font-weight="600" text-anchor="middle">Path B: eIM Retrieves from SM-DS (ES11') — Constrained Devices</text>
    72|
    73|<!-- Path B nodes -->
    74|<rect x="600" y="155" width="120" height="50" rx="6" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
    75|<text x="660" y="178" fill="white" font-size="10" font-weight="600" text-anchor="middle">eUICC</text>
    76|<text x="660" y="194" fill="#94a3b8" font-size="7" text-anchor="middle">Challenge + Info</text>
    77|
    78|<rect x="780" y="155" width="120" height="50" rx="6" fill="rgba(8,51,68,0.35)" stroke="#22d3ee" stroke-width="1.5"/>
    79|<text x="840" y="178" fill="white" font-size="10" font-weight="600" text-anchor="middle">IPA</text>
    80|<text x="840" y="194" fill="#94a3b8" font-size="7" text-anchor="middle">Relay</text>
    81|
    82|<rect x="960" y="155" width="120" height="50" rx="6" fill="rgba(251,146,60,0.35)" stroke="#fb923c" stroke-width="1.5"/>
    83|<text x="1020" y="178" fill="white" font-size="10" font-weight="600" text-anchor="middle">eIM</text>
    84|<text x="1020" y="194" fill="#94a3b8" font-size="7" text-anchor="middle">Polls SM-DS</text>
    85|
    86|<!-- Path B arrows -->
    87|<line x1="720" y1="180" x2="778" y2="180" stroke="#a78bfa" stroke-width="1.5"/>
    88|<text x="750" y="172" fill="#a78bfa" font-size="7">ES10b</text>
    89|
    90|<line x1="900" y1="180" x2="958" y2="180" stroke="#fb923c" stroke-width="2"/>
    91|<text x="930" y="172" fill="#fb923c" font-size="7">ESipa</text>
    92|
    93|<!-- Path B steps -->
    94|<rect x="600" y="225" width="460" height="140" rx="8" fill="rgba(251,146,60,0.05)" stroke="#fb923c" stroke-width="0.8"/>
    95|<text x="620" y="245" fill="#fb923c" font-size="9" font-weight="600">Flow:</text>
    96|<text x="620" y="265" fill="#94a3b8" font-size="8">1. eIM → IPA: IpaEuiccDataRequest (req auth data for SM-DS)</text>
    97|<text x="620" y="282" fill="#94a3b8" font-size="8">2. IPA → eUICC: GetEUICCChallenge + GetEUICCInfo</text>
    98|<text x="620" y="299" fill="#94a3b8" font-size="8">3. IPA → eIM: IpaEuiccDataResponse (euiccChallenge, info, certs)</text>
    99|<text x="620" y="316" fill="#94a3b8" font-size="8">4. eIM ↔ SM-DS: ES11' mutual auth (eIM relays auth messages)</text>
   100|<text x="620" y="333" fill="#94a3b8" font-size="8">5. eIM → IPA: Relay serverSigned1 → IPA → eUICC: AuthenticateServer</text>
   101|<text x="620" y="350" fill="#94a3b8" font-size="8">6. eIM → SM-DS: AuthenticateClient (relays euiccSigned1)</text>
   102|
   103|<!-- Key distinction box -->
   104|<rect x="600" y="375" width="460" height="45" rx="6" fill="rgba(251,146,60,0.1)" stroke="#fb923c" stroke-width="1" stroke-dasharray="4,2"/>
   105|<text x="830" y="395" fill="#fb923c" font-size="9" font-weight="600" text-anchor="middle">Key: eIM relays auth — never holds eUICC credentials</text>
   106|<text x="830" y="411" fill="#94a3b8" font-size="8" text-anchor="middle">eUICC still performs all cryptographic verification locally</text>
   107|
   108|<!-- ===== SM-DS CASCADING ===== -->
   109|<rect x="30" y="440" width="1040" height="22" rx="4" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
   110|<text x="550" y="455" fill="#fbbf24" font-size="10" font-weight="600" text-anchor="middle">SM-DS Cascading (ES15) — Global IoT Deployments</text>
   111|
   112|<rect x="380" y="478" width="300" height="50" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="2"/>
   113|<text x="530" y="502" fill="white" font-size="12" font-weight="600" text-anchor="middle">Root SM-DS</text>
   114|<text x="530" y="520" fill="#94a3b8" font-size="8" text-anchor="middle">Event hub ← SM-DP+ via ES12</text>
   115|
   116|<rect x="100" y="575" width="250" height="50" rx="6" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="1"/>
   117|<text x="225" y="598" fill="white" font-size="10" font-weight="600" text-anchor="middle">Alternative SM-DS (Europe)</text>
   118|<text x="225" y="616" fill="#94a3b8" font-size="7" text-anchor="middle">eUICCs poll nearest DS</text>
   119|
   120|<rect x="750" y="575" width="250" height="50" rx="6" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="1"/>
   121|<text x="875" y="598" fill="white" font-size="10" font-weight="600" text-anchor="middle">Alternative SM-DS (Asia)</text>
   122|<text x="875" y="616" fill="#94a3b8" font-size="7" text-anchor="middle">eUICCs poll nearest DS</text>
   123|
   124|<!-- ES15 arrows -->
   125|<line x1="450" y1="528" x2="280" y2="573" stroke="#fbbf24" stroke-width="1.5"/>
   126|<text x="360" y="555" fill="#fbbf24" font-size="8">ES15</text>
   127|
   128|<line x1="610" y1="528" x2="800" y2="573" stroke="#fbbf24" stroke-width="1.5"/>
   129|<text x="710" y="555" fill="#fbbf24" font-size="8">ES15</text>
   130|
   131|<!-- ===== WHEN TO USE ===== -->
   132|<rect x="30" y="645" width="1040" height="45" rx="6" fill="rgba(30,41,59,0.3)" stroke="#64748b" stroke-width="1"/>
   133|<text x="60" y="668" fill="#94a3b8" font-size="9">Path A (IPA → SM-DS): Always-on IP devices (LTE-M gateways, factory-provisioned) &amp;nbsp;&amp;nbsp;|&amp;nbsp;&amp;nbsp; Path B (eIM → SM-DS): NB-IoT sensors (PSM/eDRX), non-IP devices (LoRaWAN), constrained sleepers</text>
   134|<text x="60" y="684" fill="#94a3b8" font-size="9">Optimisation: Combined SM-DS + eIM polling consolidates Event retrieval, PSMO delivery, and result collection into a single wake cycle</text>
   135|</svg>

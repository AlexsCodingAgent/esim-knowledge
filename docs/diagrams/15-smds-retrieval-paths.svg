<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720">
<defs>
<marker id="a15y" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/></marker>
<marker id="a15c" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/></marker>
<marker id="a15o" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/></marker>
<marker id="a15g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/></marker>
<marker id="a15v" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/></marker>
<pattern id="g15" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern>
</defs>
<rect width="100%" height="100%" fill="url(#g15)"/>

<text x="550" y="28" fill="white" font-size="14" font-weight="600" text-anchor="middle">SM-DS Event Retrieval Paths (SGP.32)</text>

<!-- ===== COMMON: EVENT LIFECYCLE ===== -->
<rect x="30" y="45" width="1040" height="55" rx="8" fill="rgba(30,41,59,0.3)" stroke="#64748b" stroke-width="1"/>
<text x="60" y="68" fill="#94a3b8" font-size="10" font-weight="600">Event Lifecycle:</text>

<text x="200" y="68" fill="white" font-size="9">SM-DP+ →</text>
<rect x="270" y="55" width="110" height="22" rx="3" fill="rgba(6,78,59,0.3)"/>
<text x="325" y="70" fill="#34d399" font-size="8" text-anchor="middle">RegisterEvent</text>

<text x="395" y="68" fill="white" font-size="9">→ SM-DS →</text>
<rect x="475" y="55" width="110" height="22" rx="3" fill="rgba(120,53,15,0.3)"/>
<text x="530" y="70" fill="#fbbf24" font-size="8" text-anchor="middle">Store Event Record</text>

<text x="600" y="68" fill="white" font-size="9">→</text>
<rect x="620" y="55" width="150" height="22" rx="3" fill="rgba(8,51,68,0.3)"/>
<text x="695" y="70" fill="#22d3ee" font-size="8" text-anchor="middle">Retrieve (Path A or B)</text>

<text x="785" y="68" fill="white" font-size="9">→ Download →</text>
<rect x="880" y="55" width="110" height="22" rx="3" fill="rgba(6,78,59,0.3)"/>
<text x="935" y="70" fill="#34d399" font-size="8" text-anchor="middle">DeleteEvent</text>

<text x="60" y="88" fill="#64748b" font-size="8">Event Record = { EID, EventID, SM-DP+ Address } — SM-DS only stores pointers, never the profile itself</text>

<!-- ===== PATH A ===== -->
<rect x="30" y="115" width="500" height="22" rx="4" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="1"/>
<text x="280" y="130" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">Path A: IPA Retrieves from SM-DS (ES11) — IP-Connected Devices</text>

<!-- Path A nodes -->
<rect x="60" y="155" width="120" height="50" rx="6" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
<text x="120" y="178" fill="white" font-size="10" font-weight="600" text-anchor="middle">eUICC</text>
<text x="120" y="194" fill="#94a3b8" font-size="7" text-anchor="middle">Challenge + Info</text>

<rect x="260" y="155" width="120" height="50" rx="6" fill="rgba(8,51,68,0.35)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="320" y="178" fill="white" font-size="10" font-weight="600" text-anchor="middle">IPA (IPAd)</text>
<text x="320" y="194" fill="#94a3b8" font-size="7" text-anchor="middle">LPD / LDS</text>

<rect x="460" y="155" width="120" height="50" rx="6" fill="rgba(120,53,15,0.35)" stroke="#fbbf24" stroke-width="1.5"/>
<text x="520" y="178" fill="white" font-size="10" font-weight="600" text-anchor="middle">SM-DS</text>
<text x="520" y="194" fill="#94a3b8" font-size="7" text-anchor="middle">Event Records</text>

<!-- Path A arrows -->
<line x1="180" y1="180" x2="258" y2="180" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#a15v)"/>
<text x="220" y="172" fill="#a78bfa" font-size="7">ES10b</text>

<line x1="380" y1="180" x2="458" y2="180" stroke="#22d3ee" stroke-width="2" marker-end="url(#a15c)"/>
<text x="420" y="172" fill="#22d3ee" font-size="7">ES11 (TLS)</text>

<!-- Path A steps -->
<rect x="60" y="225" width="520" height="120" rx="8" fill="rgba(8,51,68,0.05)" stroke="#22d3ee" stroke-width="0.8"/>
<text x="80" y="245" fill="#22d3ee" font-size="9" font-weight="600">Flow:</text>
<text x="80" y="265" fill="#94a3b8" font-size="8">1. IPA → eUICC: GetEuiccConfiguredAddresses (SM-DS address)</text>
<text x="80" y="282" fill="#94a3b8" font-size="8">2. IPA → eUICC: GetEUICCChallenge + GetEUICCInfo</text>
<text x="80" y="299" fill="#94a3b8" font-size="8">3. IPA ↔ SM-DS: ES11 mutual auth (TLS + ECDSA challenge/response)</text>
<text x="80" y="316" fill="#94a3b8" font-size="8">4. IPA → eUICC: AuthenticateServer (eUICC verifies SM-DS certificate)</text>
<text x="80" y="333" fill="#94a3b8" font-size="8">5. SM-DS → IPA: Event Record(s) → IPA initiates Direct Download with SM-DP+</text>

<!-- ===== PATH B ===== -->
<rect x="570" y="115" width="500" height="22" rx="4" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1"/>
<text x="820" y="130" fill="#fb923c" font-size="10" font-weight="600" text-anchor="middle">Path B: eIM Retrieves from SM-DS (ES11') — Constrained Devices</text>

<!-- Path B nodes -->
<rect x="600" y="155" width="120" height="50" rx="6" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
<text x="660" y="178" fill="white" font-size="10" font-weight="600" text-anchor="middle">eUICC</text>
<text x="660" y="194" fill="#94a3b8" font-size="7" text-anchor="middle">Challenge + Info</text>

<rect x="780" y="155" width="120" height="50" rx="6" fill="rgba(8,51,68,0.35)" stroke="#22d3ee" stroke-width="1.5"/>
<text x="840" y="178" fill="white" font-size="10" font-weight="600" text-anchor="middle">IPA</text>
<text x="840" y="194" fill="#94a3b8" font-size="7" text-anchor="middle">Relay</text>

<rect x="960" y="155" width="120" height="50" rx="6" fill="rgba(251,146,60,0.35)" stroke="#fb923c" stroke-width="1.5"/>
<text x="1020" y="178" fill="white" font-size="10" font-weight="600" text-anchor="middle">eIM</text>
<text x="1020" y="194" fill="#94a3b8" font-size="7" text-anchor="middle">Polls SM-DS</text>

<!-- Path B arrows -->
<line x1="720" y1="180" x2="778" y2="180" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#a15v)"/>
<text x="750" y="172" fill="#a78bfa" font-size="7">ES10b</text>

<line x1="900" y1="180" x2="958" y2="180" stroke="#fb923c" stroke-width="2" marker-end="url(#a15o)"/>
<text x="930" y="172" fill="#fb923c" font-size="7">ESipa</text>

<!-- Path B steps -->
<rect x="600" y="225" width="460" height="140" rx="8" fill="rgba(251,146,60,0.05)" stroke="#fb923c" stroke-width="0.8"/>
<text x="620" y="245" fill="#fb923c" font-size="9" font-weight="600">Flow:</text>
<text x="620" y="265" fill="#94a3b8" font-size="8">1. eIM → IPA: IpaEuiccDataRequest (req auth data for SM-DS)</text>
<text x="620" y="282" fill="#94a3b8" font-size="8">2. IPA → eUICC: GetEUICCChallenge + GetEUICCInfo</text>
<text x="620" y="299" fill="#94a3b8" font-size="8">3. IPA → eIM: IpaEuiccDataResponse (euiccChallenge, info, certs)</text>
<text x="620" y="316" fill="#94a3b8" font-size="8">4. eIM ↔ SM-DS: ES11' mutual auth (eIM relays auth messages)</text>
<text x="620" y="333" fill="#94a3b8" font-size="8">5. eIM → IPA: Relay serverSigned1 → IPA → eUICC: AuthenticateServer</text>
<text x="620" y="350" fill="#94a3b8" font-size="8">6. eIM → SM-DS: AuthenticateClient (relays euiccSigned1)</text>

<!-- Key distinction box -->
<rect x="600" y="375" width="460" height="45" rx="6" fill="rgba(251,146,60,0.1)" stroke="#fb923c" stroke-width="1" stroke-dasharray="4,2"/>
<text x="830" y="395" fill="#fb923c" font-size="9" font-weight="600" text-anchor="middle">Key: eIM relays auth — never holds eUICC credentials</text>
<text x="830" y="411" fill="#94a3b8" font-size="8" text-anchor="middle">eUICC still performs all cryptographic verification locally</text>

<!-- ===== SM-DS CASCADING ===== -->
<rect x="30" y="440" width="1040" height="22" rx="4" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
<text x="550" y="455" fill="#fbbf24" font-size="10" font-weight="600" text-anchor="middle">SM-DS Cascading (ES15) — Global IoT Deployments</text>

<rect x="380" y="478" width="300" height="50" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="2"/>
<text x="530" y="502" fill="white" font-size="12" font-weight="600" text-anchor="middle">Root SM-DS</text>
<text x="530" y="520" fill="#94a3b8" font-size="8" text-anchor="middle">Event hub ← SM-DP+ via ES12</text>

<rect x="100" y="575" width="250" height="50" rx="6" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="1"/>
<text x="225" y="598" fill="white" font-size="10" font-weight="600" text-anchor="middle">Alternative SM-DS (Europe)</text>
<text x="225" y="616" fill="#94a3b8" font-size="7" text-anchor="middle">eUICCs poll nearest DS</text>

<rect x="750" y="575" width="250" height="50" rx="6" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="1"/>
<text x="875" y="598" fill="white" font-size="10" font-weight="600" text-anchor="middle">Alternative SM-DS (Asia)</text>
<text x="875" y="616" fill="#94a3b8" font-size="7" text-anchor="middle">eUICCs poll nearest DS</text>

<!-- ES15 arrows -->
<line x1="450" y1="528" x2="280" y2="573" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#a15y)"/>
<text x="360" y="555" fill="#fbbf24" font-size="8">ES15</text>

<line x1="610" y1="528" x2="800" y2="573" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#a15y)"/>
<text x="710" y="555" fill="#fbbf24" font-size="8">ES15</text>

<!-- ===== WHEN TO USE ===== -->
<rect x="30" y="645" width="1040" height="45" rx="6" fill="rgba(30,41,59,0.3)" stroke="#64748b" stroke-width="1"/>
<text x="60" y="668" fill="#94a3b8" font-size="9">Path A (IPA → SM-DS): Always-on IP devices (LTE-M gateways, factory-provisioned) &amp;nbsp;&amp;nbsp;|&amp;nbsp;&amp;nbsp; Path B (eIM → SM-DS): NB-IoT sensors (PSM/eDRX), non-IP devices (LoRaWAN), constrained sleepers</text>
<text x="60" y="684" fill="#94a3b8" font-size="9">Optimisation: Combined SM-DS + eIM polling consolidates Event retrieval, PSMO delivery, and result collection into a single wake cycle</text>
</svg>

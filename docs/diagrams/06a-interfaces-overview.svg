<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 620">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1050" height="620" fill="#0a1628"/>

  <!-- Title -->
  <text x="525" y="40" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="bold" letter-spacing="1">RSP Interface Architecture</text>
  <text x="525" y="62" text-anchor="middle" fill="#64748b" font-size="11">GSMA SGP.22 — Consumer eSIM Remote SIM Provisioning</text>

  <!-- ============================================================ -->
  <!-- CONNECTION PATHS (drawn behind nodes) -->
  <!-- ============================================================ -->

  <!-- ES10a/b/c: LPA ↔ eUICC (horizontal, bottom) -->
  <path d="M 240,465 L 730,465" stroke="#22d3ee" stroke-width="1.8" stroke-opacity="0.6" fill="none" stroke-dasharray="8,4"/>
  <!-- ES10 arrowheads -->
  <polygon points="240,465 250,460 250,470" fill="#22d3ee" opacity="0.8"/>
  <polygon points="730,465 720,460 720,470" fill="#22d3ee" opacity="0.8"/>

  <!-- ES12: SM-DS ↔ SM-DP+ (horizontal, top) -->
  <path d="M 620,125 L 800,140" stroke="#fbbf24" stroke-width="1.8" stroke-opacity="0.6" fill="none" stroke-dasharray="6,3"/>
  <polygon points="620,125 630,120 630,130" fill="#fbbf24" opacity="0.8"/>
  <polygon points="800,140 790,135 790,145" fill="#fbbf24" opacity="0.8"/>

  <!-- ES2+: Operator ↔ SM-DP+ -->
  <path d="M 240,125 L 400,110" stroke="#94a3b8" stroke-width="1.8" stroke-opacity="0.6" fill="none"/>
  <polygon points="240,125 232,120 232,130" fill="#94a3b8" opacity="0.8"/>
  <polygon points="400,110 408,105 408,115" fill="#94a3b8" opacity="0.8"/>

  <!-- ES8+: SM-DP+ → eUICC (unidirectional) -->
  <path d="M 600,155 L 770,420" stroke="#34d399" stroke-width="2" stroke-opacity="0.65" fill="none"/>
  <polygon points="770,420 761,413 765,426" fill="#34d399" opacity="0.85"/>

  <!-- ES9+: LPA ↔ SM-DP+ -->
  <path d="M 145,410 L 500,155" stroke="#22d3ee" stroke-width="1.8" stroke-opacity="0.55" fill="none"/>
  <polygon points="145,410 152,402 139,404" fill="#22d3ee" opacity="0.8"/>
  <polygon points="500,155 493,163 506,161" fill="#22d3ee" opacity="0.8"/>

  <!-- ES11: LPA ↔ SM-DS -->
  <path d="M 245,420 L 800,165" stroke="#fbbf24" stroke-width="1.8" stroke-opacity="0.5" fill="none"/>
  <polygon points="245,420 252,412 239,414" fill="#fbbf24" opacity="0.8"/>
  <polygon points="800,165 793,173 806,171" fill="#fbbf24" opacity="0.8"/>

  <!-- ============================================================ -->
  <!-- NODES -->
  <!-- ============================================================ -->

  <!-- Operator (top-left, gray) -->
  <rect x="60" y="95" width="180" height="60" rx="8" fill="#94a3b8" fill-opacity="0.12" stroke="#94a3b8" stroke-width="1.5" stroke-opacity="0.7"/>
  <text x="150" y="120" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold" letter-spacing="2" opacity="0.9">OPERATOR</text>
  <text x="150" y="140" text-anchor="middle" fill="#64748b" font-size="9" opacity="0.7">MNO / MVNO</text>

  <!-- SM-DP+ (top-center, green) -->
  <rect x="410" y="80" width="190" height="60" rx="8" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-width="1.8" stroke-opacity="0.8"/>
  <text x="505" y="105" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold" letter-spacing="1.5" opacity="0.9">SM-DP+</text>
  <text x="505" y="125" text-anchor="middle" fill="#64748b" font-size="9" opacity="0.7">Profile Generation</text>

  <!-- SM-DS (top-right, amber) -->
  <rect x="810" y="95" width="180" height="60" rx="8" fill="#fbbf24" fill-opacity="0.12" stroke="#fbbf24" stroke-width="1.5" stroke-opacity="0.7"/>
  <text x="900" y="120" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold" letter-spacing="1.5" opacity="0.9">SM-DS</text>
  <text x="900" y="140" text-anchor="middle" fill="#64748b" font-size="9" opacity="0.7">Discovery Service</text>

  <!-- LPA (bottom-left, cyan) -->
  <rect x="60" y="435" width="190" height="60" rx="8" fill="#22d3ee" fill-opacity="0.12" stroke="#22d3ee" stroke-width="1.8" stroke-opacity="0.8"/>
  <text x="155" y="460" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="bold" letter-spacing="1.5" opacity="0.9">LPA</text>
  <text x="155" y="480" text-anchor="middle" fill="#64748b" font-size="9" opacity="0.7">Local Profile Assistant</text>

  <!-- eUICC (bottom-right, purple) -->
  <rect x="730" y="435" width="190" height="60" rx="8" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-width="1.8" stroke-opacity="0.8"/>
  <text x="825" y="460" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold" letter-spacing="1.5" opacity="0.9">eUICC</text>
  <text x="825" y="480" text-anchor="middle" fill="#64748b" font-size="9" opacity="0.7">Embedded UICC</text>

  <!-- ============================================================ -->
  <!-- INTERFACE LABELS -->
  <!-- ============================================================ -->

  <!-- ES2+ label: between Operator and SM-DP+ -->
  <rect x="273" y="93" width="118" height="38" rx="4" fill="#0f1f33" stroke="#94a3b8" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="332" y="107" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="bold">ES2+</text>
  <text x="332" y="122" text-anchor="middle" fill="#94a3b8" font-size="8.5">HTTP / JSON</text>

  <!-- ES8+ label: between SM-DP+ and eUICC -->
  <rect x="634" y="250" width="118" height="38" rx="4" fill="#0f1f33" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="693" y="264" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="bold">ES8+</text>
  <text x="693" y="279" text-anchor="middle" fill="#34d399" font-size="8">ASN.1 TLV / SCP03t</text>

  <!-- ES9+ label: between LPA and SM-DP+ -->
  <rect x="253" y="254" width="118" height="38" rx="4" fill="#0f1f33" stroke="#22d3ee" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="312" y="268" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="bold">ES9+</text>
  <text x="312" y="283" text-anchor="middle" fill="#22d3ee" font-size="8.5">HTTP / JSON</text>

  <!-- ES10a/b/c label: between LPA and eUICC -->
  <rect x="392" y="488" width="126" height="38" rx="4" fill="#0f1f33" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="455" y="502" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">ES10a / b / c</text>
  <text x="455" y="517" text-anchor="middle" fill="#a78bfa" font-size="8.5">APDU / ISO 7816</text>

  <!-- ES11 label: between LPA and SM-DS -->
  <rect x="438" y="268" width="118" height="38" rx="4" fill="#0f1f33" stroke="#fbbf24" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="497" y="282" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="bold">ES11</text>
  <text x="497" y="297" text-anchor="middle" fill="#fbbf24" font-size="8.5">HTTP / JSON</text>

  <!-- ES12 label: between SM-DS and SM-DP+ -->
  <rect x="654" y="106" width="92" height="38" rx="4" fill="#0f1f33" stroke="#fbbf24" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="700" y="120" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="bold">ES12</text>
  <text x="700" y="135" text-anchor="middle" fill="#fbbf24" font-size="8.5">HTTP / JSON</text>

  <!-- ============================================================ -->
  <!-- LEGEND (bottom center) -->
  <!-- ============================================================ -->

  <text x="525" y="545" text-anchor="middle" fill="#64748b" font-size="9" opacity="0.6">Interface Families — 6 total across 5 SGP.22 Architectural Components</text>

  <!-- Legend swatches -->
  <rect x="310" y="558" width="8" height="8" rx="1" fill="#94a3b8" opacity="0.7"/>
  <text x="323" y="566" fill="#94a3b8" font-size="9">Operator</text>

  <rect x="393" y="558" width="8" height="8" rx="1" fill="#34d399" opacity="0.7"/>
  <text x="406" y="566" fill="#34d399" font-size="9">SM-DP+</text>

  <rect x="475" y="558" width="8" height="8" rx="1" fill="#fbbf24" opacity="0.7"/>
  <text x="488" y="566" fill="#fbbf24" font-size="9">SM-DS</text>

  <rect x="553" y="558" width="8" height="8" rx="1" fill="#22d3ee" opacity="0.7"/>
  <text x="566" y="566" fill="#22d3ee" font-size="9">LPA</text>

  <rect x="615" y="558" width="8" height="8" rx="1" fill="#a78bfa" opacity="0.7"/>
  <text x="628" y="566" fill="#a78bfa" font-size="9">eUICC</text>

</svg>
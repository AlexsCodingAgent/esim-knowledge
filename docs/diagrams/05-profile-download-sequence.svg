<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 700">
    11|<defs>
    12|<marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/></marker>
    13|<marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/></marker>
    14|<marker id="ac" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/></marker>
    15|<marker id="av" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/></marker>
    16|<marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/></marker>
    17|<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern>
    18|</defs>
    19|<rect width="100%" height="100%" fill="url(#grid)"/>
    20|
    21|<!-- Column headers -->
    22|<text x="180" y="30" fill="white" font-size="11" font-weight="600" text-anchor="middle">End User</text>
    23|<text x="380" y="30" fill="white" font-size="11" font-weight="600" text-anchor="middle">Operator</text>
    24|<text x="580" y="30" fill="white" font-size="11" font-weight="600" text-anchor="middle">SM-DP+</text>
    25|<text x="780" y="30" fill="white" font-size="11" font-weight="600" text-anchor="middle">LPA + eUICC</text>
    26|<text x="990" y="30" fill="white" font-size="11" font-weight="600" text-anchor="middle">SM-DS</text>
    27|
    28|<!-- Vertical lifelines -->
    29|<line x1="180" y1="45" x2="180" y2="670" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
    30|<line x1="380" y1="45" x2="380" y2="670" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
    31|<line x1="580" y1="45" x2="580" y2="670" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
    32|<line x1="780" y1="45" x2="780" y2="670" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
    33|<line x1="990" y1="45" x2="990" y2="670" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
    34|
    35|<!-- PHASE 1: Initiation -->
    36|<rect x="30" y="55" width="160" height="22" rx="4" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="1"/>
    37|<text x="110" y="70" fill="#fb7185" font-size="10" font-weight="600" text-anchor="middle">Phase 1: Initiation</text>
    38|
    39|<!-- Step 1: Subscribe -->
    40|<line x1="180" y1="95" x2="378" y2="95" stroke="#94a3b8" stroke-width="1" marker-end="url(#a)"/>
    41|<text x="280" y="88" fill="#94a3b8" font-size="8" text-anchor="middle">1. Subscribe, provide EID</text>
    42|
    43|<!-- Step 2-3: DownloadOrder -->
    44|<line x1="380" y1="115" x2="578" y2="115" stroke="#34d399" stroke-width="1.5" marker-end="url(#ag)"/>
    45|<text x="480" y="108" fill="#34d399" font-size="8" text-anchor="middle">2. ES2+.DownloadOrder</text>
    46|<line x1="580" y1="135" x2="382" y2="135" stroke="#34d399" stroke-width="1" marker-end="url(#ag)"/>
    47|<text x="480" y="148" fill="#34d399" font-size="8" text-anchor="middle">3. ICCID reserved</text>
    48|
    49|<!-- Step 4-6: ConfirmOrder -->
    50|<line x1="380" y1="165" x2="578" y2="165" stroke="#34d399" stroke-width="1.5" marker-end="url(#ag)"/>
    51|<text x="480" y="158" fill="#34d399" font-size="8" text-anchor="middle">4. ES2+.ConfirmOrder</text>
    52|<line x1="580" y1="185" x2="990" y2="185" stroke="#fbbf24" stroke-width="1" marker-end="url(#a)"/>
    53|<text x="785" y="178" fill="#fbbf24" font-size="8" text-anchor="middle">5. ES12.RegisterEvent (optional)</text>
    54|<line x1="380" y1="205" x2="182" y2="205" stroke="#94a3b8" stroke-width="1" marker-end="url(#a)"/>
    55|<text x="280" y="218" fill="#94a3b8" font-size="8" text-anchor="middle">6. Activation Code (LPA:1$...)</text>
    56|
    57|<!-- PHASE 2: Mutual Auth -->
    58|<rect x="30" y="245" width="160" height="22" rx="4" fill="rgba(34,211,238,0.3)" stroke="#22d3ee" stroke-width="1"/>
    59|<text x="110" y="260" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">Phase 2: Mutual Auth</text>
    60|
    61|<!-- Step 7-8: Challenge -->
    62|<rect x="750" y="280" width="60" height="20" rx="3" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="0.8"/>
    63|<text x="780" y="294" fill="#a78bfa" font-size="8" text-anchor="middle">Gen Ch</text>
    64|<line x1="780" y1="310" x2="780" y2="340" stroke="#a78bfa" stroke-width="1" marker-end="url(#av)"/>
    65|<text x="790" y="328" fill="#a78bfa" font-size="8">7. eUICCChallenge</text>
    66|
    67|<!-- Step 8-9: InitiateAuth -->
    68|<line x1="780" y1="360" x2="582" y2="360" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#ac)"/>
    69|<text x="680" y="353" fill="#22d3ee" font-size="8" text-anchor="middle">8. ES9+.InitiateAuthentication</text>
    70|
    71|<rect x="550" y="375" width="60" height="20" rx="3" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="0.8"/>
    72|<text x="580" y="389" fill="#34d399" font-size="8" text-anchor="middle">Sign</text>
    73|
    74|<!-- Step 10: serverSigned1 -->
    75|<line x1="580" y1="405" x2="778" y2="405" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#ac)"/>
    76|<text x="680" y="398" fill="#22d3ee" font-size="8" text-anchor="middle">9. serverSigned1 + signature + CERT.DPauth</text>
    77|
    78|<!-- Step 11: AuthenticateServer -->
    79|<text x="730" y="426" fill="#a78bfa" font-size="8">10. ES10b.AuthenticateServer</text>
    80|
    81|<rect x="750" y="438" width="60" height="20" rx="3" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="0.8"/>
    82|<text x="780" y="452" fill="#a78bfa" font-size="8" text-anchor="middle">Verify</text>
    83|
    84|<!-- Step 12: euiccSigned1 -->
    85|<rect x="750" y="470" width="60" height="20" rx="3" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="0.8"/>
    86|<text x="780" y="484" fill="#a78bfa" font-size="8" text-anchor="middle">Sign</text>
    87|<line x1="780" y1="500" x2="582" y2="500" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#ac)"/>
    88|<text x="680" y="493" fill="#22d3ee" font-size="8" text-anchor="middle">11. euiccSigned1 + CERT.EUICC</text>
    89|
    90|<rect x="550" y="515" width="60" height="20" rx="3" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="0.8"/>
    91|<text x="580" y="529" fill="#34d399" font-size="8" text-anchor="middle">Verify</text>
    92|
    93|<text x="680" y="555" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">✓ Mutual Authentication Complete</text>
    94|
    95|<!-- PHASE 3: Installation -->
    96|<rect x="30" y="580" width="160" height="22" rx="4" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1"/>
    97|<text x="110" y="595" fill="#34d399" font-size="10" font-weight="600" text-anchor="middle">Phase 3: Install</text>
    98|
    99|<!-- ES8+ steps -->
   100|<line x1="580" y1="610" x2="778" y2="610" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#av)"/>
   101|<text x="680" y="603" fill="#a78bfa" font-size="8" text-anchor="middle">12. ES8+.InitialiseSecureChannel (ECDH key agree)</text>
   102|<line x1="580" y1="630" x2="778" y2="630" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#av)"/>
   103|<text x="680" y="623" fill="#a78bfa" font-size="8" text-anchor="middle">13. ES8+.ConfigureISDP (create ISD-P)</text>
   104|<line x1="580" y1="650" x2="778" y2="650" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#av)"/>
   105|<text x="680" y="643" fill="#a78bfa" font-size="8" text-anchor="middle">14. ES8+.StoreMetadata → LoadProfileElements…</text>
   106|
   107|<rect x="750" y="660" width="60" height="25" rx="4" fill="rgba(34,211,238,0.25)" stroke="#22d3ee" stroke-width="1"/>
   108|<text x="780" y="676" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">Profile</text>
   109|<text x="780" y="689" fill="#94a3b8" font-size="7" text-anchor="middle">Installed</text>
   110|
   111|</svg>
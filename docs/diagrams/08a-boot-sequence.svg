<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 650">
  <!-- Background -->
  <rect width="950" height="650" fill="#0a1628"/>

  <!-- Title -->
  <text x="475" y="32" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="20" font-weight="bold">eUICC Boot &amp; Initialisation Sequence</text>
  <line x1="180" y1="43" x2="770" y2="43" stroke="#fbbf24" stroke-width="1" opacity="0.25"/>

  <!-- Phase separator lines -->
  <line x1="15" y1="195" x2="935" y2="195" stroke="#1a2f4a" stroke-width="1"/>
  <line x1="15" y1="335" x2="935" y2="335" stroke="#1a2f4a" stroke-width="1"/>
  <line x1="15" y1="475" x2="935" y2="475" stroke="#1a2f4a" stroke-width="1"/>

  <!-- Vertical flow connectors (left side) -->
  <line x1="8" y1="180" x2="8" y2="218" stroke="#fbbf24" stroke-width="1.5" opacity="0.4"/>
  <polygon points="8,218 4,210 12,210" fill="#fbbf24" opacity="0.4"/>
  <line x1="8" y1="320" x2="8" y2="358" stroke="#fbbf24" stroke-width="1.5" opacity="0.4"/>
  <polygon points="8,358 4,350 12,350" fill="#fbbf24" opacity="0.4"/>
  <line x1="8" y1="460" x2="8" y2="498" stroke="#fbbf24" stroke-width="1.5" opacity="0.4"/>
  <polygon points="8,498 4,490 12,490" fill="#fbbf24" opacity="0.4"/>

  <!-- ================================================================== -->
  <!-- PHASE 1 — Initialisation                                           -->
  <!-- ================================================================== -->
  <rect x="15" y="70" width="920" height="2" fill="#fbbf24" opacity="0.3"/>
  <text x="25" y="85" fill="#fbbf24" font-family="sans-serif" font-size="14" font-weight="bold">Phase 1 — Initialisation</text>

  <!-- Box 1: ATR -->
  <rect x="20" y="105" width="270" height="55" rx="6" fill="#0d1b33" stroke="#a78bfa" stroke-width="2"/>
  <text x="155" y="128" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">ATR</text>
  <text x="155" y="147" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="10">Answer to Reset</text>

  <!-- Arrow 1→2 -->
  <path d="M290 132 L340 132" fill="none" stroke="white" stroke-width="1.5"/>
  <polygon points="350,132 338,126 338,138" fill="white"/>

  <!-- Box 2: CAT Init -->
  <rect x="355" y="105" width="270" height="55" rx="6" fill="#0d1b33" stroke="#a78bfa" stroke-width="2"/>
  <text x="490" y="128" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">CAT Init</text>
  <text x="490" y="147" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="10">Card Application Toolkit</text>

  <!-- Arrow 2→3 -->
  <path d="M625 132 L670 132" fill="none" stroke="white" stroke-width="1.5"/>
  <polygon points="680,132 668,126 668,138" fill="white"/>

  <!-- Box 3: Default FS -->
  <rect x="685" y="105" width="245" height="55" rx="6" fill="#0d1b33" stroke="#a78bfa" stroke-width="2"/>
  <text x="807" y="128" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">Default FS</text>

  <!-- Sub-text under Default FS -->
  <text x="475" y="182" text-anchor="middle" fill="#8899aa" font-family="sans-serif" font-size="10">MF (root)  +  EF-ENV-CLASSES  +  EF-UMPC</text>

  <!-- ================================================================== -->
  <!-- PHASE 2 — Capability Exchange                                      -->
  <!-- ================================================================== -->
  <rect x="15" y="210" width="920" height="2" fill="#fbbf24" opacity="0.3"/>
  <text x="25" y="225" fill="#fbbf24" font-family="sans-serif" font-size="14" font-weight="bold">Phase 2 — Capability Exchange</text>

  <!-- Box 1: Terminal Capability -->
  <rect x="20" y="245" width="435" height="55" rx="6" fill="#0d1b33" stroke="#22d3ee" stroke-width="2"/>
  <text x="237" y="268" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">Terminal Capability</text>

  <!-- Sub-text below Terminal Capability -->
  <text x="237" y="318" text-anchor="middle" fill="#8899aa" font-family="sans-serif" font-size="10">tag 83  bits  b1–b4 : eUICC feature flags</text>

  <!-- Arrow 1→2 -->
  <path d="M455 272 L505 272" fill="none" stroke="white" stroke-width="1.5"/>
  <polygon points="515,272 503,266 503,278" fill="white"/>

  <!-- Box 2: ES10 Gating -->
  <rect x="520" y="245" width="410" height="55" rx="6" fill="#0d1b33" stroke="#fb7185" stroke-width="2"/>
  <text x="725" y="268" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">ES10 Gating</text>
  <text x="725" y="287" text-anchor="middle" fill="#fb7185" font-family="sans-serif" font-size="10">Enable / disable remote SIM services</text>

  <!-- ================================================================== -->
  <!-- PHASE 3 — ISD-R &amp; LPA Initialisation                            -->
  <!-- ================================================================== -->
  <rect x="15" y="350" width="920" height="2" fill="#fbbf24" opacity="0.3"/>
  <text x="25" y="365" fill="#fbbf24" font-family="sans-serif" font-size="14" font-weight="bold">Phase 3 — ISD-R &amp; LPA Initialisation</text>

  <!-- Box 1: SELECT ISD-R -->
  <rect x="20" y="385" width="435" height="55" rx="6" fill="#0d1b33" stroke="#a78bfa" stroke-width="2"/>
  <text x="237" y="408" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">SELECT ISD-R</text>
  <text x="237" y="427" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="10">Issuer Security Domain – Root</text>

  <!-- Arrow 1→2 -->
  <path d="M455 412 L505 412" fill="none" stroke="white" stroke-width="1.5"/>
  <polygon points="515,412 503,406 503,418" fill="white"/>

  <!-- Box 2: LPA Mode -->
  <rect x="520" y="385" width="410" height="55" rx="6" fill="#0d1b33" stroke="#fb7185" stroke-width="2"/>
  <text x="725" y="408" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">LPA Mode</text>

  <!-- Branch indicators under LPA Mode -->
  <rect x="550" y="448" width="90" height="18" rx="4" fill="none" stroke="#fb7185" stroke-width="1" opacity="0.6"/>
  <text x="595" y="461" text-anchor="middle" fill="#fb7185" font-family="sans-serif" font-size="10">LPAd</text>
  <rect x="700" y="448" width="90" height="18" rx="4" fill="none" stroke="#fb7185" stroke-width="1" opacity="0.6"/>
  <text x="745" y="461" text-anchor="middle" fill="#fb7185" font-family="sans-serif" font-size="10">LPAe</text>
  <rect x="850" y="448" width="70" height="18" rx="4" fill="none" stroke="#fb7185" stroke-width="1" opacity="0.6"/>
  <text x="885" y="461" text-anchor="middle" fill="#fb7185" font-family="sans-serif" font-size="10">both</text>

  <!-- ================================================================== -->
  <!-- PHASE 4 — Profile Discovery &amp; Fallback                          -->
  <!-- ================================================================== -->
  <rect x="15" y="490" width="920" height="2" fill="#fbbf24" opacity="0.3"/>
  <text x="25" y="505" fill="#fbbf24" font-family="sans-serif" font-size="14" font-weight="bold">Phase 4 — Profile Discovery &amp; Fallback</text>

  <!-- Box 1: Default SM-DP+ -->
  <rect x="20" y="525" width="270" height="55" rx="6" fill="#0d1b33" stroke="#22d3ee" stroke-width="2"/>
  <text x="155" y="548" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">Default SM-DP+</text>
  <text x="155" y="567" text-anchor="middle" fill="#22d3ee" font-family="sans-serif" font-size="9">Profile download server</text>

  <!-- Fallback arrow 1→2 (dashed pink) -->
  <path d="M290 552 L330 552" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="340,552 330,547 330,557" fill="#fb7185"/>
  <text x="315" y="542" text-anchor="middle" fill="#fb7185" font-family="sans-serif" font-size="8">fallback</text>

  <!-- Box 2: Root SM-DS -->
  <rect x="345" y="525" width="270" height="55" rx="6" fill="#0d1b33" stroke="#fb7185" stroke-width="2"/>
  <text x="480" y="548" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">Root SM-DS</text>
  <text x="480" y="567" text-anchor="middle" fill="#fb7185" font-family="sans-serif" font-size="9">Discovery Server</text>

  <!-- Arrow 2→3 -->
  <path d="M615 552 L665 552" fill="none" stroke="white" stroke-width="1.5"/>
  <polygon points="675,552 665,547 665,557" fill="white"/>

  <!-- Box 3: Prompt AC -->
  <rect x="680" y="525" width="250" height="55" rx="6" fill="#0d1b33" stroke="#22d3ee" stroke-width="2"/>
  <text x="805" y="548" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">Prompt AC</text>
  <text x="805" y="567" text-anchor="middle" fill="#22d3ee" font-family="sans-serif" font-size="9">Activation Code input</text>

  <!-- ================================================================== -->
  <!-- LEGEND                                                             -->
  <!-- ================================================================== -->
  <rect x="15" y="610" width="920" height="28" rx="5" fill="#0d1b33" stroke="#1a2f4a" stroke-width="1"/>

  <rect x="30" y="617" width="12" height="12" rx="2" fill="#a78bfa" opacity="0.5"/>
  <text x="48" y="628" fill="#a78bfa" font-family="sans-serif" font-size="9">eUICC</text>

  <rect x="110" y="617" width="12" height="12" rx="2" fill="#22d3ee" opacity="0.5"/>
  <text x="128" y="628" fill="#22d3ee" font-family="sans-serif" font-size="9">Device / Terminal</text>

  <rect x="260" y="617" width="12" height="12" rx="2" fill="#fb7185" opacity="0.5"/>
  <text x="278" y="628" fill="#fb7185" font-family="sans-serif" font-size="9">Branch / Decision</text>

  <text x="600" y="628" fill="#8899aa" font-family="sans-serif" font-size="8">eUICC Boot &amp; Initialisation  —  GSMA SGP.22</text>
</svg>

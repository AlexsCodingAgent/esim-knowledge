     1|<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 620">
     2|<style>text { font-family: system-ui, sans-serif; }</style>
     3|<defs>
     4|
5|
6|
7|
8|
9|<pattern id="id-grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern>
    10|</defs>
    11|<rect width="100%" height="100%" fill="url(#id-grid)"/>
    12|
    13|<!-- Title -->
    14|<text x="525" y="30" fill="white" font-size="14" font-weight="700" text-anchor="middle">Indirect Profile Download — eIM-Mediated</text>
    15|<text x="525" y="48" fill="#94a3b8" font-size="9" text-anchor="middle">eIM handles all SM-DP+ interaction — IPA never connects to SM-DP+</text>
    16|<line x1="30" y1="58" x2="1020" y2="58" stroke="#1e293b" stroke-width="1"/>
    17|
    18|<!-- ===== Server Side ===== -->
    19|<text x="525" y="78" fill="#94a3b8" font-size="9" text-anchor="middle">Server Side</text>
    20|
    21|<!-- Operator -->
    22|<rect x="40" y="95" width="130" height="50" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
    23|<text x="105" y="116" fill="white" font-size="10" font-weight="600" text-anchor="middle">Operator</text>
    24|<text x="105" y="132" fill="#94a3b8" font-size="7" text-anchor="middle">Backend</text>
    25|
    26|<!-- SM-DP+ -->
    27|<rect x="250" y="95" width="160" height="50" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
    28|<text x="330" y="116" fill="white" font-size="11" font-weight="600" text-anchor="middle">SM-DP+</text>
    29|<text x="330" y="132" fill="#34d399" font-size="8" text-anchor="middle">Profile Factory</text>
    30|
    31|<!-- eIM (key role in indirect) -->
    32|<rect x="500" y="90" width="200" height="60" rx="8" fill="rgba(251,146,60,0.4)" stroke="#fb923c" stroke-width="2.5"/>
    33|<text x="600" y="116" fill="white" font-size="12" font-weight="700" text-anchor="middle">eIM</text>
    34|<text x="600" y="133" fill="#fb923c" font-size="8" text-anchor="middle">Handles All SM-DP+ Traffic</text>
    35|<text x="600" y="145" fill="#64748b" font-size="7" text-anchor="middle">ES9+' ←→ ES9+</text>
    36|
    37|<!-- ===== Server-side arrows ===== -->
    38|<!-- Operator → SM-DP+: ES2+ -->
    39|<line x1="170" y1="120" x2="248" y2="120" stroke="#34d399" stroke-width="1.5"/>
    40|<text x="209" y="112" fill="#34d399" font-size="8">ES2+</text>
    41|
    42|<!-- SM-DP+ ↔ eIM: ES9+' (bidirectional) -->
    43|<line x1="410" y1="120" x2="498" y2="120" stroke="#fb923c" stroke-width="2"/>
    44|<text x="454" y="112" fill="#fb923c" font-size="8" font-weight="600">ES9+'</text>
    45|<line x1="498" y1="135" x2="410" y2="135" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,3"/>
    46|<text x="454" y="148" fill="#64748b" font-size="7">BPP returned</text>
    47|
    48|<!-- ===== eIM annotation ===== -->
    49|<rect x="750" y="90" width="270" height="55" rx="6" fill="rgba(251,146,60,0.06)" stroke="#fb923c" stroke-width="0.8" stroke-dasharray="4,2"/>
    50|<text x="885" y="112" fill="#fb923c" font-size="9" font-weight="600" text-anchor="middle">eIM as Security Gateway</text>
    51|<text x="885" y="128" fill="#94a3b8" font-size="8" text-anchor="middle">• Terminates TLS to SM-DP+</text>
    52|<text x="885" y="142" fill="#94a3b8" font-size="8" text-anchor="middle">• Re-encrypts for IPA transport</text>
    53|
    54|<!-- ===== Divider ===== -->
    55|<line x1="30" y1="175" x2="1020" y2="175" stroke="#1e293b" stroke-width="1" stroke-dasharray="8,4"/>
    56|<text x="525" y="195" fill="#64748b" font-size="9" text-anchor="middle">ESipa Boundary — eIM relays bound profile package to device</text>
    57|
    58|<!-- ===== ESipa relay ===== -->
    59|<rect x="150" y="210" width="700" height="28" rx="6" fill="rgba(251,146,60,0.12)" stroke="#fb923c" stroke-width="1" stroke-dasharray="4,2"/>
    60|<text x="500" y="229" fill="#fb923c" font-size="9" text-anchor="middle">ESipa: eIM relays Bound Profile Package (BPP) to IPA — IPA has NO direct SM-DP+ connection</text>
    61|
    62|<!-- ===== Device Side ===== -->
    63|<text x="525" y="265" fill="#94a3b8" font-size="9" text-anchor="middle">Device Side — IPA Only Sees eIM</text>
    64|
    65|<!-- IPA -->
    66|<rect x="40" y="285" width="240" height="70" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
    67|<text x="160" y="312" fill="white" font-size="12" font-weight="600" text-anchor="middle">IPA</text>
    68|<text x="160" y="328" fill="#94a3b8" font-size="8" text-anchor="middle">IoT Profile Assistant</text>
    69|<text x="160" y="344" fill="#22d3ee" font-size="8" text-anchor="middle">Receives BPP via ESipa only</text>
    70|
    71|<!-- eUICC -->
    72|<rect x="380" y="285" width="180" height="70" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    73|<text x="470" y="312" fill="white" font-size="12" font-weight="600" text-anchor="middle">eUICC</text>
    74|<text x="470" y="328" fill="#94a3b8" font-size="8" text-anchor="middle">ISD-R | ISD-P</text>
    75|<text x="470" y="344" fill="#a78bfa" font-size="8" text-anchor="middle">Profile Installed</text>
    76|
    77|<!-- ===== Device arrows ===== -->
    78|<!-- IPA → eUICC: ES10b -->
    79|<line x1="280" y1="320" x2="378" y2="320" stroke="#22d3ee" stroke-width="1.5"/>
    80|<text x="329" y="313" fill="#22d3ee" font-size="8">ES10b</text>
    81|
    82|<!-- ===== Why Indirect box ===== -->
    83|<rect x="610" y="285" width="410" height="150" rx="8" fill="rgba(30,41,59,0.3)" stroke="#475569" stroke-width="1"/>
    84|<text x="815" y="310" fill="white" font-size="10" font-weight="600" text-anchor="middle">When to Use Indirect Download</text>
    85|<line x1="630" y1="318" x2="1000" y2="318" stroke="#1e293b" stroke-width="0.5"/>
    86|
    87|<rect x="630" y="328" width="370" height="20" rx="3" fill="rgba(251,146,60,0.1)"/>
    88|<text x="815" y="343" fill="#fb923c" font-size="9" text-anchor="middle">Device can only reach eIM (no internet access)</text>
    89|
    90|<rect x="630" y="353" width="370" height="20" rx="3" fill="rgba(251,146,60,0.1)"/>
    91|<text x="815" y="368" fill="#fb923c" font-size="9" text-anchor="middle">eIM terminates TLS — device doesn't need certs</text>
    92|
    93|<rect x="630" y="378" width="370" height="20" rx="3" fill="rgba(251,146,60,0.1)"/>
    94|<text x="815" y="393" fill="#fb923c" font-size="9" text-anchor="middle">Non-IP protocol that only eIM understands</text>
    95|
    96|<rect x="630" y="403" width="370" height="20" rx="3" fill="rgba(251,146,60,0.1)"/>
    97|<text x="815" y="418" fill="#fb923c" font-size="9" text-anchor="middle">eIM can CancelSession (propagates to SM-DP+)</text>
    98|
    99|<!-- ===== No SM-DP+ connection ===== -->
   100|<rect x="40" y="455" width="520" height="55" rx="6" fill="rgba(136,19,55,0.1)" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="6,3"/>
   101|<text x="300" y="477" fill="#fb7185" font-size="11" font-weight="600" text-anchor="middle">✗ No Direct IPA↔SM-DP+ Connection</text>
   102|<text x="300" y="495" fill="#94a3b8" font-size="9" text-anchor="middle">The IPA has zero knowledge of the SM-DP+. It only communicates with the eIM via ESipa.</text>
   103|<text x="300" y="507" fill="#64748b" font-size="8" text-anchor="middle">ESrp (RSP) or proprietary transport between eIM and IPA</text>
   104|
   105|<!-- Footer -->
   106|<text x="525" y="600" fill="#64748b" font-size="8" text-anchor="middle">Indirect Download: eIM is the sole mediator between SM-DP+ and device</text>
   107|
   108|</svg>
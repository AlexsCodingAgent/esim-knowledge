     1|<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 620">
     2|<style>text { font-family: system-ui, sans-serif; }</style>
     3|<defs>
     4|
5|
6|
7|
8|
9|<pattern id="acf-grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern>
    10|</defs>
    11|<rect width="100%" height="100%" fill="url(#acf-grid)"/>
    12|
    13|<!-- Title -->
    14|<text x="525" y="30" fill="white" font-size="14" font-weight="700" text-anchor="middle">Direct Download — Triggered by eIM with Activation Code</text>
    15|<text x="525" y="48" fill="#94a3b8" font-size="9" text-anchor="middle">Operator pushes AC to eIM → IPA uses it for ES9+/ES8+ with SM-DP+</text>
    16|<line x1="30" y1="58" x2="1020" y2="58" stroke="#1e293b" stroke-width="1"/>
    17|
    18|<!-- ===== Top Row: Server Side ===== -->
    19|<text x="525" y="78" fill="#94a3b8" font-size="9" text-anchor="middle">Server Side</text>
    20|
    21|<!-- Operator -->
    22|<rect x="40" y="90" width="140" height="50" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
    23|<text x="110" y="114" fill="white" font-size="11" font-weight="600" text-anchor="middle">Operator</text>
    24|<text x="110" y="130" fill="#94a3b8" font-size="7" text-anchor="middle">Backend / Portal</text>
    25|
    26|<!-- eIM -->
    27|<rect x="255" y="90" width="200" height="50" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="2"/>
    28|<text x="355" y="114" fill="white" font-size="11" font-weight="600" text-anchor="middle">eIM</text>
    29|<text x="355" y="130" fill="#fb923c" font-size="8" text-anchor="middle">eSIM IoT Remote Manager</text>
    30|
    31|<!-- SM-DP+ -->
    32|<rect x="535" y="90" width="160" height="50" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
    33|<text x="615" y="114" fill="white" font-size="11" font-weight="600" text-anchor="middle">SM-DP+</text>
    34|<text x="615" y="130" fill="#34d399" font-size="8" text-anchor="middle">Profile Factory</text>
    35|
    36|<!-- ===== Arrows Top Row ===== -->
    37|<!-- Operator → eIM: push AC -->
    38|<line x1="180" y1="115" x2="253" y2="115" stroke="#94a3b8" stroke-width="1.5"/>
    39|<text x="216" y="107" fill="#94a3b8" font-size="8" text-anchor="middle">AC push</text>
    40|
    41|<!-- eIM → ESipa label (down then right) -->
    42|<path d="M 355 140 L 355 200" stroke="#fb923c" stroke-width="1.5"/>
    43|<text x="330" y="175" fill="#fb923c" font-size="8">ESipa</text>
    44|<text x="330" y="185" fill="#64748b" font-size="7">AC forward</text>
    45|
    46|<!-- ===== Middle Section: ESipa Transfer ===== -->
    47|<text x="462" y="225" fill="#fb923c" font-size="10" font-weight="600" text-anchor="middle">Activation Code (AC)</text>
    48|<rect x="310" y="240" width="305" height="30" rx="6" fill="rgba(251,146,60,0.12)" stroke="#fb923c" stroke-width="1" stroke-dasharray="4,2"/>
    49|<text x="462" y="260" fill="#fb923c" font-size="9" text-anchor="middle">SM-DP+ address + MatchingID + ConfirmationCode</text>
    50|
    51|<!-- ===== Bottom Row: Device Side ===== -->
    52|<text x="525" y="300" fill="#94a3b8" font-size="9" text-anchor="middle">Device Side</text>
    53|
    54|<!-- IPA -->
    55|<rect x="100" y="315" width="220" height="65" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
    56|<text x="210" y="342" fill="white" font-size="12" font-weight="600" text-anchor="middle">IPA</text>
    57|<text x="210" y="358" fill="#94a3b8" font-size="8" text-anchor="middle">IoT Profile Assistant</text>
    58|<text x="210" y="372" fill="#22d3ee" font-size="8" text-anchor="middle">Extracts AC, Contacts SM-DP+</text>
    59|
    60|<!-- eUICC -->
    61|<rect x="430" y="315" width="180" height="65" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    62|<text x="520" y="342" fill="white" font-size="12" font-weight="600" text-anchor="middle">eUICC</text>
    63|<text x="520" y="358" fill="#94a3b8" font-size="8" text-anchor="middle">ISD-R | ISD-P</text>
    64|<text x="520" y="372" fill="#a78bfa" font-size="8" text-anchor="middle">Profile Installed</text>
    65|
    66|<!-- ===== Flow Arrows ===== -->
    67|<!-- ESipa path: eIM down to IPA level — routed LEFT of AC box -->
    68|<path d="M 355 200 L 290 200 L 290 347 L 315 347" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="6,3"/>
    69|<text x="290" y="195" fill="#fb923c" font-size="7" text-anchor="middle">ESipa</text>
    70|
    71|<!-- IPA → SM-DP+: ES9+ (up and right) -->
    72|<path d="M 230 315 L 230 160 L 615 160 L 615 138" stroke="#22d3ee" stroke-width="1.5"/>
    73|<text x="380" y="153" fill="#22d3ee" font-size="8">ES9+ InitiateAuthentication</text>
    74|
    75|<!-- SM-DP+ → IPA: ES8+ (down and left) -->
    76|<path d="M 615 160 L 615 200 L 265 200 L 265 347 L 268 347" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3"/>
    77|<text x="440" y="218" fill="#a78bfa" font-size="8">ES8+ Bound Profile Package (BPP)</text>
    78|
    79|<!-- IPA → eUICC: ES10b -->
    80|<line x1="320" y1="347" x2="428" y2="347" stroke="#22d3ee" stroke-width="1.5"/>
    81|<text x="374" y="340" fill="#22d3ee" font-size="8">ES10b</text>
    82|
    83|<!-- ===== Sequence steps ===== -->
    84|<rect x="690" y="315" width="330" height="180" rx="8" fill="rgba(30,41,59,0.3)" stroke="#475569" stroke-width="1"/>
    85|<text x="855" y="338" fill="white" font-size="10" font-weight="600" text-anchor="middle">Sequence</text>
    86|<line x1="710" y1="346" x2="1000" y2="346" stroke="#1e293b" stroke-width="0.5"/>
    87|
    88|<text x="710" y="366" fill="#94a3b8" font-size="9">1.</text>
    89|<text x="728" y="366" fill="#fb923c" font-size="9">Operator pushes AC → eIM (ordering portal)</text>
    90|
    91|<text x="710" y="384" fill="#94a3b8" font-size="9">2.</text>
    92|<text x="728" y="384" fill="#fb923c" font-size="9">eIM pushes AC via ESipa → IPA</text>
    93|
    94|<text x="710" y="402" fill="#94a3b8" font-size="9">3.</text>
    95|<text x="728" y="402" fill="#22d3ee" font-size="9">IPA resolves SM-DP+ address from AC</text>
    96|
    97|<text x="710" y="420" fill="#94a3b8" font-size="9">4.</text>
    98|<text x="728" y="420" fill="#22d3ee" font-size="9">IPA → ES9+ InitiateAuthentication</text>
    99|
   100|<text x="710" y="438" fill="#94a3b8" font-size="9">5.</text>
   101|<text x="728" y="438" fill="#a78bfa" font-size="9">SM-DP+ returns BPP via ES8+</text>
   102|
   103|<text x="710" y="456" fill="#94a3b8" font-size="9">6.</text>
   104|<text x="728" y="456" fill="#22d3ee" font-size="9">IPA relays BPP → eUICC via ES10b</text>
   105|
   106|<text x="710" y="478" fill="#94a3b8" font-size="9"></text>
   107|<text x="728" y="478" fill="#34d399" font-size="9">✓ Profile installed on eUICC</text>
   108|
   109|<!-- ===== Key insight ===== -->
   110|<rect x="40" y="445" width="620" height="40" rx="6" fill="rgba(136,19,55,0.08)" stroke="#fb7185" stroke-width="0.8" stroke-dasharray="4,2"/>
   111|<text x="350" y="469" fill="#fb7185" font-size="9" text-anchor="middle">No QR code, no user. The Activation Code is pushed server-to-server (Operator → eIM → IPA)</text>
   112|
   113|<!-- Footer -->
   114|<text x="525" y="600" fill="#64748b" font-size="8" text-anchor="middle">Direct Download Path: Device has IP connectivity — IPA contacts SM-DP+ on its own</text>

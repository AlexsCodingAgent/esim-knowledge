    97|    97|<text x="710" y="420" fill="#94a3b8" font-size="9">4.</text>
    98|    98|<text x="728" y="420" fill="#22d3ee" font-size="9">IPA → ES9+ InitiateAuthentication</text>
    99|    99|
   100|   100|<text x="710" y="438" fill="#94a3b8" font-size="9">5.</text>
   101|   101|<text x="728" y="438" fill="#a78bfa" font-size="9">SM-DP+ returns BPP via ES8+</text>

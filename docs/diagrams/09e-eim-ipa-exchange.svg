     1|     1|<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 650">
     2|     2|<style>text { font-family: system-ui, sans-serif; }</style>
     3|     3|<defs>
     4|     4|
     5|5|
     6|6|

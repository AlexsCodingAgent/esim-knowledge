<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <rect width="1000" height="600" fill="#0a1628"/>

  <!-- ====== SM-DS (top-left) ====== -->
  <rect x="100" y="30" width="240" height="70" rx="8" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <text x="220" y="72" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="20" font-weight="bold">SM-DS</text>

  <!-- ====== SM-DP+ (top-right) ====== -->
  <rect x="660" y="30" width="240" height="70" rx="8" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="780" y="72" text-anchor="middle" fill="#34d399" font-family="sans-serif" font-size="20" font-weight="bold">SM-DP+</text>

  <!-- ====== Device Box (left) ====== -->
  <rect x="25" y="170" width="390" height="410" rx="8" fill="#0d2847" stroke="#22d3ee" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="25" y="170" width="390" height="32" rx="8" fill="#0d2847" stroke="none"/>
  <rect x="25" y="186" width="390" height="16" fill="#0d2847" stroke="none"/>
  <text x="220" y="194" text-anchor="middle" fill="#22d3ee" font-family="sans-serif" font-size="15" font-weight="bold">Device (LPAd)</text>

  <!-- LDSd -->
  <rect x="45" y="218" width="350" height="85" rx="6" fill="#0a1e36" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="220" y="264" text-anchor="middle" fill="#22d3ee" font-family="sans-serif" font-size="16" font-weight="bold">LDSd</text>
  <text x="220" y="284" text-anchor="middle" fill="#4dd8f2" font-family="sans-serif" font-size="11">Local Discovery Service</text>

  <!-- LPDd -->
  <rect x="45" y="320" width="350" height="85" rx="6" fill="#0a1e36" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="220" y="366" text-anchor="middle" fill="#22d3ee" font-family="sans-serif" font-size="16" font-weight="bold">LPDd</text>
  <text x="220" y="386" text-anchor="middle" fill="#4dd8f2" font-family="sans-serif" font-size="11">Local Profile Download</text>

  <!-- LUId -->
  <rect x="45" y="422" width="350" height="85" rx="6" fill="#0a1e36" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="220" y="468" text-anchor="middle" fill="#22d3ee" font-family="sans-serif" font-size="16" font-weight="bold">LUId</text>
  <text x="220" y="488" text-anchor="middle" fill="#4dd8f2" font-family="sans-serif" font-size="11">Local User Interface</text>

  <!-- ====== eUICC Box (right) ====== -->
  <rect x="585" y="170" width="390" height="410" rx="8" fill="#1a1040" stroke="#a78bfa" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="585" y="170" width="390" height="32" rx="8" fill="#1a1040" stroke="none"/>
  <rect x="585" y="186" width="390" height="16" fill="#1a1040" stroke="none"/>
  <text x="780" y="194" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="15" font-weight="bold">eUICC</text>

  <!-- ECASD -->
  <rect x="605" y="218" width="350" height="85" rx="6" fill="#130a33" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="780" y="264" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="16" font-weight="bold">ECASD</text>
  <text x="780" y="284" text-anchor="middle" fill="#c4b5fd" font-family="sans-serif" font-size="11">eUICC Controlling Authority</text>

  <!-- ISD-Ps -->
  <rect x="605" y="320" width="350" height="85" rx="6" fill="#130a33" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="780" y="366" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="16" font-weight="bold">ISD-Ps</text>
  <text x="780" y="386" text-anchor="middle" fill="#c4b5fd" font-family="sans-serif" font-size="11">Issuer Security Domain — Profiles</text>

  <!-- ISD-R -->
  <rect x="605" y="422" width="350" height="85" rx="6" fill="#130a33" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="780" y="468" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="16" font-weight="bold">ISD-R</text>
  <text x="780" y="488" text-anchor="middle" fill="#c4b5fd" font-family="sans-serif" font-size="11">Issuer Security Domain — Root</text>

  <!-- ====== ARROWS ====== -->

  <!-- ES8+: SM-DP+ → eUICC -->
  <path d="M 780 100 L 780 160" fill="none" stroke="#34d399" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="780,168 773,156 787,156" fill="#34d399"/>
  <text x="795" y="138" fill="#34d399" font-family="sans-serif" font-size="14" font-weight="bold">ES8+</text>

  <!-- ES9+: LPDd → SM-DP+ -->
  <path d="M 395 362 L 530 362 L 530 100 L 654 100" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="662,100 650,93 650,107" fill="#22d3ee"/>
  <text x="543" y="235" fill="#22d3ee" font-family="sans-serif" font-size="14" font-weight="bold">ES9+</text>

  <!-- ES10a: eUICC → LDSd -->
  <path d="M 605 260 L 404 260" fill="none" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="396,260 408,253 408,267" fill="#a78bfa"/>
  <text x="500" y="250" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="14" font-weight="bold">ES10a</text>

  <!-- ES10b: LPDd ↔ ISD-Ps -->
  <path d="M 395 362 L 600 362" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="608,362 596,355 596,369" fill="#22d3ee"/>
  <polygon points="387,362 399,355 399,369" fill="#22d3ee"/>
  <text x="500" y="352" text-anchor="middle" fill="#22d3ee" font-family="sans-serif" font-size="14" font-weight="bold">ES10b</text>

  <!-- ES10c: LUId ↔ ISD-R -->
  <path d="M 395 464 L 600 464" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="608,464 596,457 596,471" fill="#22d3ee"/>
  <polygon points="387,464 399,457 399,471" fill="#22d3ee"/>
  <text x="500" y="454" text-anchor="middle" fill="#22d3ee" font-family="sans-serif" font-size="14" font-weight="bold">ES10c</text>

  <!-- ES11: LDSd ↔ SM-DS -->
  <path d="M 220 218 L 220 106" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="220,98 213,110 227,110" fill="#fbbf24"/>
  <polygon points="220,226 213,214 227,214" fill="#fbbf24"/>
  <text x="232" y="168" fill="#fbbf24" font-family="sans-serif" font-size="14" font-weight="bold">ES11</text>

  <!-- ====== TITLE ====== -->
  <text x="500" y="580" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="18" font-weight="bold" letter-spacing="0.5">LPAd Architecture — LPA in the Device</text>
</svg>
    10|10|<pattern id="eb-grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/></pattern>
    11|    11|</defs>
    12|    12|<rect width="100%" height="100%" fill="#0a1628"/>
    13|    13|
    14|    14|<!-- Title -->
    15|    15|<text x="525" y="30" fill="white" font-size="14" font-weight="700" text-anchor="middle">Direct Download — Option B: eIM Polls SM-DS</text>
    16|    16|<text x="525" y="48" fill="#94a3b8" font-size="9" text-anchor="middle">eIM polls SM-DS server-side → forwards Event Record to IPA via ESipa</text>
    17|    17|<line x1="30" y1="58" x2="1020" y2="58" stroke="#1e293b" stroke-width="1"/>
    18|    18|
    19|    19|<!-- ===== Server Side (dominant in this pattern) ===== -->
    20|    20|<text x="525" y="78" fill="#94a3b8" font-size="9" text-anchor="middle">Server Side — Heavy Lifting</text>
    21|    21|
    22|    22|<!-- eIM -->
    23|    23|<rect x="40" y="95" width="200" height="55" rx="6" fill="rgba(251,146,60,0.35)" stroke="#fb923c" stroke-width="2"/>
    24|    24|<text x="140" y="120" fill="white" font-size="11" font-weight="600" text-anchor="middle">eIM</text>
    25|    25|<text x="140" y="136" fill="#fb923c" font-size="8" text-anchor="middle">Polls SM-DS, Forwards to IPA</text>
    26|    26|
    27|    27|<!-- SM-DS -->
    28|    28|<rect x="320" y="95" width="160" height="55" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
    29|    29|<text x="400" y="120" fill="white" font-size="11" font-weight="600" text-anchor="middle">SM-DS</text>
    30|    30|<text x="400" y="136" fill="#fbbf24" font-size="8" text-anchor="middle">Event Registry</text>
    31|    31|
    32|    32|<!-- SM-DP+ -->
    33|    33|<rect x="565" y="95" width="160" height="55" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
    34|    34|<text x="645" y="120" fill="white" font-size="11" font-weight="600" text-anchor="middle">SM-DP+</text>
    35|    35|<text x="645" y="136" fill="#34d399" font-size="8" text-anchor="middle">Profile Factory</text>
    36|    36|
    37|    37|<!-- ===== Server-side arrows ===== -->
    38|    38|<!-- eIM → SM-DS: ES11' poll -->
    39|    39|<line x1="240" y1="122" x2="318" y2="122" stroke="#fbbf24" stroke-width="1.5"/>
    40|    40|<text x="279" y="114" fill="#fbbf24" font-size="8">ES11' poll</text>
    41|    41|
    42|    42|<!-- SM-DS → eIM: Event Record -->
    43|    43|<line x1="320" y1="140" x2="240" y2="140" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3"/>
    44|    44|<text x="279" y="153" fill="#fbbf24" font-size="8">Event Record</text>
    45|    45|
    46|    46|<!-- ===== Divider ===== -->
    47|    47|<line x1="30" y1="170" x2="1020" y2="170" stroke="#1e293b" stroke-width="1" stroke-dasharray="8,4"/>
    48|    48|<text x="525" y="190" fill="#64748b" font-size="9" text-anchor="middle">ESipa Boundary — eIM forwards Event Record to IPA</text>
    49|    49|
    50|    50|<!-- ===== ESipa transfer ===== -->
    51|    51|<rect x="100" y="205" width="750" height="30" rx="6" fill="rgba(251,146,60,0.12)" stroke="#fb923c" stroke-width="1" stroke-dasharray="4,2"/>
    52|    52|<text x="475" y="225" fill="#fb923c" font-size="9" text-anchor="middle">ESipa: Event Record forwarded (SM-DP+ address + EventID) — device never touches SM-DS</text>
    53|    53|
    54|    54|<!-- ===== Device Side ===== -->
    55|    55|<text x="525" y="260" fill="#94a3b8" font-size="9" text-anchor="middle">Device Side — Lightweight</text>
    56|    56|
    57|    57|<!-- IPA -->
    58|    58|<rect x="40" y="275" width="220" height="65" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
    59|    59|<text x="150" y="302" fill="white" font-size="12" font-weight="600" text-anchor="middle">IPA</text>
    60|    60|<text x="150" y="318" fill="#94a3b8" font-size="8" text-anchor="middle">IoT Profile Assistant</text>
    61|    61|<text x="150" y="334" fill="#22d3ee" font-size="8" text-anchor="middle">Receives Event via ESipa</text>
    62|    62|
    63|    63|<!-- eUICC -->
    64|    64|<rect x="340" y="275" width="160" height="65" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    65|    65|<text x="420" y="302" fill="white" font-size="12" font-weight="600" text-anchor="middle">eUICC</text>
    66|    66|<text x="420" y="318" fill="#94a3b8" font-size="8" text-anchor="middle">ISD-R | ISD-P</text>
    67|    67|<text x="420" y="334" fill="#a78bfa" font-size="8" text-anchor="middle">Receives BPP</text>
    68|    68|
    69|    69|<!-- ===== Device-side arrows ===== -->
    70|    70|<!-- IPA → SM-DP+: ES9+ (up, right) — routed above divider at y=155 -->
    71|    71|<path d="M 150 275 L 150 155 L 645 155 L 645 148" stroke="#22d3ee" stroke-width="1.5"/>
    72|    72|<text x="400" y="148" fill="#22d3ee" font-size="8">ES9+: Initiate Auth</text>
    73|    73|
    74|    74|<!-- SM-DP+ → IPA: ES8+ BPP (down, left) — routed below ESipa rect at y=250 -->
    75|    75|<path d="M 645 170 L 645 250 L 200 250 L 200 275 L 203 275" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3"/>
    76|    76|<text x="400" y="243" fill="#a78bfa" font-size="8">ES8+: BPP</text>
    77|    77|
    78|    78|<!-- IPA → eUICC: ES10b -->
    79|    79|<line x1="260" y1="307" x2="338" y2="307" stroke="#22d3ee" stroke-width="1.5"/>
    80|    80|<text x="299" y="300" fill="#22d3ee" font-size="8">ES10b</text>
    81|    81|
    82|    82|<!-- ===== Network Constrained note ===== -->
    83|    83|<rect x="580" y="275" width="440" height="140" rx="8" fill="rgba(136,19,55,0.08)" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,2"/>
    84|    84|<text x="800" y="298" fill="#fb7185" font-size="11" font-weight="600" text-anchor="middle">Network Constrained Devices</text>
    85|    85|<line x1="600" y1="306" x2="1000" y2="306" stroke="#1e293b" stroke-width="0.5"/>
    86|    86|
    87|    87|<text x="600" y="325" fill="#94a3b8" font-size="9">• LPWA networks (NB-IoT, LTE-M w/o IP)</text>
    88|    88|<text x="600" y="343" fill="#94a3b8" font-size="9">• Polling SM-DS directly = expensive airtime</text>
    89|    89|<text x="600" y="361" fill="#94a3b8" font-size="9">• eIM polls server-side where bandwidth is free</text>
    90|    90|<text x="600" y="379" fill="#94a3b8" font-size="9">• IPA only receives result via efficient ESipa</text>
    91|    91|<text x="600" y="397" fill="#22d3ee" font-size="9" font-weight="600">✓ No device-to-SM-DS traffic required</text>
    92|    92|
    93|    93|<!-- ===== Key difference ===== -->
    94|    94|<rect x="40" y="440" width="520" height="60" rx="6" fill="rgba(251,146,60,0.08)" stroke="#fb923c" stroke-width="0.8" stroke-dasharray="4,2"/>
    95|    95|<text x="300" y="462" fill="#fb923c" font-size="10" font-weight="600" text-anchor="middle">Key Difference from Option A</text>
    96|    96|<text x="300" y="480" fill="#94a3b8" font-size="9" text-anchor="middle">SM-DS polling stays server-side. ES11' (eIM→SM-DS) replaces ES11 (IPA→SM-DS).</text>
    97|    97|<text x="300" y="496" fill="#94a3b8" font-size="9" text-anchor="middle">Event Record is relayed over ESipa — not pulled by the device.</text>
    98|    98|

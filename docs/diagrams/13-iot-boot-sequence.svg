    45|    45|<!-- ===== DETAILED FLOW ===== -->
    46|    46|
    47|    47|<!-- Stage 1 details -->
    48|    48|<rect x="30" y="115" width="160" height="55" rx="6" fill="rgba(30,41,59,0.4)" stroke="#34d399" stroke-width="1"/>
    49|    49|<text x="110" y="136" fill="#34d399" font-size="9" font-weight="600" text-anchor="middle">eUICC OS boots</text>
    50|    50|<text x="110" y="152" fill="#94a3b8" font-size="8" text-anchor="middle">ISD-R becomes active</text>
    51|    51|<text x="110" y="164" fill="#64748b" font-size="7" text-anchor="middle">Physical power-on / wake</text>
    52|    52|
    53|    53|<!-- Stage 2 details -->
    54|    54|<rect x="210" y="115" width="160" height="55" rx="6" fill="rgba(30,41,59,0.4)" stroke="#a78bfa" stroke-width="1"/>
    55|    55|<text x="290" y="136" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">ISD-R scans profiles</text>
    56|    56|<text x="290" y="152" fill="#94a3b8" font-size="8" text-anchor="middle">Enabled/Disabled/Test</text>
    57|    57|<text x="290" y="164" fill="#64748b" font-size="7" text-anchor="middle">Read EF.DIR, EF.ICCID</text>
    58|    58|
    59|    59|<!-- Stage 3 details -->
    60|    60|<rect x="390" y="115" width="160" height="55" rx="6" fill="rgba(30,41,59,0.4)" stroke="#22d3ee" stroke-width="1"/>
    61|    61|<text x="470" y="136" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">Device SELECT by AID</text>
    62|    62|<text x="470" y="152" fill="#94a3b8" font-size="8" text-anchor="middle">ISD-R responds with FCI</text>
    63|    63|<text x="470" y="164" fill="#64748b" font-size="7" text-anchor="middle">Check lifecycle state</text>
    64|    64|
    65|    65|<!-- Stage 4 - Fork -->
    66|    66|<rect x="30" y="190" width="940" height="110" rx="10" fill="rgba(251,146,60,0.04)" stroke="#fb923c" stroke-width="1" stroke-dasharray="6,3"/>
    67|    67|<text x="50" y="208" fill="#fb923c" font-size="10" font-weight="600">Stage 4: IPA Activation (two modes)</text>
    68|    68|
    69|    69|<!-- IPAd path -->
    70|    70|<rect x="50" y="225" width="420" height="60" rx="8" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="1.5"/>
    71|    71|<text x="260" y="248" fill="#22d3ee" font-size="11" font-weight="600" text-anchor="middle">IPAd (IPA in Device)</text>
    72|    72|<text x="260" y="266" fill="#94a3b8" font-size="8" text-anchor="middle">IPA initialises separately → reads EimConfigurationData from eUICC</text>
    73|    73|<text x="260" y="280" fill="#64748b" font-size="7" text-anchor="middle">Full OS process on device application processor</text>
    74|    74|
    75|    75|<!-- IPAe path -->
    76|    76|<rect x="510" y="225" width="440" height="60" rx="8" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1.5"/>
    77|    77|<text x="730" y="248" fill="#a78bfa" font-size="11" font-weight="600" text-anchor="middle">IPAe (IPA in eUICC)</text>
    78|    78|<text x="730" y="266" fill="#94a3b8" font-size="8" text-anchor="middle">Device triggers IPAe via ISD-R → IPAe reads EimConfigurationData</text>
    79|    79|<text x="730" y="280" fill="#64748b" font-size="7" text-anchor="middle">Runs inside eUICC secure element, no external processor needed</text>
    80|    80|
    81|    81|<!-- Stage 5 -->
    82|    82|<rect x="30" y="320" width="460" height="65" rx="8" fill="rgba(30,41,59,0.4)" stroke="#fbbf24" stroke-width="1.5"/>
    83|    83|<text x="260" y="343" fill="#fbbf24" font-size="10" font-weight="600" text-anchor="middle">Stage 5: eIM Discovery</text>
    84|    84|<text x="260" y="360" fill="#94a3b8" font-size="8" text-anchor="middle">IPA reads EF.EIMCFG → finds associated eIMs</text>
    85|    85|<text x="260" y="376" fill="#94a3b8" font-size="8" text-anchor="middle">Establishes secure connection (TLS/DTLS) to eIM using trustedPublicKeyDataTls</text>
    86|    86|
    87|    87|<!-- Stage 6 -->
    88|    88|<rect x="510" y="320" width="460" height="65" rx="8" fill="rgba(30,41,59,0.4)" stroke="#fb7185" stroke-width="1.5"/>
    89|    89|<text x="740" y="343" fill="#fb7185" font-size="10" font-weight="600" text-anchor="middle">Stage 6: Connectivity Assessment</text>
    90|    90|<text x="740" y="360" fill="#94a3b8" font-size="8" text-anchor="middle">If enabled profile exists → baseband attempts network attach</text>
    91|    91|<text x="740" y="376" fill="#94a3b8" font-size="8" text-anchor="middle">If no profile → wait for ProfileDownloadTrigger OR fallback</text>
    92|    92|
    93|    93|<!-- ===== CONNECTIVITY DECISION ===== -->
    94|    94|<rect x="30" y="405" width="940" height="28" rx="4" fill="rgba(34,211,238,0.08)" stroke="#22d3ee" stroke-width="0.8"/>
    95|    95|<text x="500" y="423" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">Post-Boot Decision: Does the device have a working network connection?</text>
    96|    96|
    97|    97|<!-- YES path -->
    98|    98|<rect x="70" y="450" width="400" height="110" rx="10" fill="rgba(6,78,59,0.1)" stroke="#34d399" stroke-width="1.5"/>
    99|    99|<text x="270" y="475" fill="#34d399" font-size="12" font-weight="600" text-anchor="middle">✓ Profile Enabled — Network Available</text>
   100|   100|<rect x="100" y="490" width="340" height="25" rx="4" fill="rgba(6,78,59,0.25)"/>
   101|   101|<text x="270" y="507" fill="white" font-size="9" text-anchor="middle">IPA sends IpaEuiccDataRequest (polls eIM for pending ops)</text>
   102|   102|<rect x="100" y="520" width="340" height="25" rx="4" fill="rgba(6,78,59,0.25)"/>
   103|   103|<text x="270" y="537" fill="white" font-size="9" text-anchor="middle">IPA delivers pending notifications to eIM + SM-DS</text>
   104|   104|
   105|   105|<!-- NO path -->
   106|   106|<rect x="530" y="450" width="400" height="110" rx="10" fill="rgba(136,19,55,0.1)" stroke="#fb7185" stroke-width="1.5"/>
   107|   107|<text x="730" y="475" fill="#fb7185" font-size="12" font-weight="600" text-anchor="middle">✗ No Enabled Profile</text>
   108|   108|<rect x="560" y="490" width="340" height="50" rx="4" fill="rgba(136,19,55,0.2)"/>
   109|   109|<text x="730" y="510" fill="white" font-size="9" text-anchor="middle">Fallback Profile configured?</text>
   110|   110|<text x="730" y="526" fill="white" font-size="9" text-anchor="middle">→ YES: eUICC enables Fallback Profile</text>
   111|   111|<text x="730" y="538" fill="#94a3b8" font-size="9" text-anchor="middle">→ NO: wait for eIM to push ProfileDownloadTrigger</text>

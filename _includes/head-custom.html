<link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/navy.css' | relative_url }}">

{% if page.date %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "TechArticle",
  "headline": "{{ page.title | escape }}",
  "description": "{{ page.description | default: page.excerpt | strip_html | escape }}",
  "datePublished": "{{ page.date | date: '%Y-%m-%d' }}",
  "author": {
    "@type": "Person",
    "name": "Alex Tuddenham",
    "url": "https://tuddenham.info"
  },
  "publisher": {
    "@type": "Organization",
    "name": "eUICC.tech",
    "url": "https://euicc.tech"
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ site.url }}{{ page.url }}"
  }
}
</script>
{% endif %}

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Make title link to homepage
  var title = document.querySelector('#title h1');
  if (title && !title.querySelector('a')) {
    var link = document.createElement('a');
    link.href = '{{ site.baseurl }}/';
    link.style.color = 'inherit';
    link.style.textDecoration = 'none';
    link.textContent = title.textContent;
    title.textContent = '';
    title.appendChild(link);
  }

  // Replace theme credits with custom footer
  var credits = document.querySelectorAll('#title .credits');
  if (credits.length >= 2) {
    credits[0].innerHTML = 'Created by <a href="https://tuddenham.info">Alex Tuddenham</a>';
    credits[1].innerHTML = 'Theme by <a href="https://twitter.com/mattgraham">mattgraham</a>';
  }

  // Build JSON-LD BreadcrumbList from URL path
  var path = window.location.pathname.replace(/\/$/, '');
  var segments = path.split('/').filter(function(s) { return s.length > 0; });
  var url = 'https://euicc.tech';
  var items = [{ '@type': 'ListItem', 'position': 1, 'name': 'eUICC.tech', 'item': url + '/' }];

  // Map directory segments to readable names
  var dirNames = {
    'docs': 'Documentation',
    'articles': 'Articles',
    'sgp02': 'SGP.02 M2M eSIM',
    'sgp22': 'SGP.22 Consumer RSP',
    'sgp22-v3': 'SGP.22 v3 Unified RSP',
    'sgp23': 'SGP.23 RSP Testing',
    'sgp23-1': 'SGP.23-1 eUICC Testing',
    'sgp25': 'SGP.25 eUICC Security',
    'sgp26': 'SGP.26 Test Certificates',
    'sgp29': 'SGP.29 EID',
    'sgp32': 'SGP.32 IoT eSIM',
    'sgp33-3': 'SGP.33 eIM Testing',
    'sgp41': 'SGP.41 IFPP',
    'kids': 'Illustrated Guides'
  };

  for (var i = 0; i < segments.length; i++) {
    var seg = segments[i];
    // Skip if it's the final .html or .md file (the article itself)
    if (i === segments.length - 1 && (seg.endsWith('.html') || seg.endsWith('.md'))) {
      // Use the page title or H1 as the last breadcrumb name
      var h1 = document.querySelector('h1');
      var pageName = h1 ? h1.textContent.trim() : seg.replace(/\.(html|md)$/, '').replace(/-/g, ' ');
      // Truncate long titles
      if (pageName.length > 80) pageName = pageName.substring(0, 77) + '...';
      url += '/' + seg;
      items.push({ '@type': 'ListItem', 'position': i + 2, 'name': pageName, 'item': url });
    } else if (dirNames[seg]) {
      url += '/' + seg;
      items.push({ '@type': 'ListItem', 'position': i + 2, 'name': dirNames[seg], 'item': url });
    }
  }

  // Only inject if we have more than just the home item
  if (items.length > 1) {
    var ld = {
      '@context': 'https://schema.org',
      '@type': 'BreadcrumbList',
      'itemListElement': items
    };
    var script = document.createElement('script');
    script.type = 'application/ld+json';
    script.textContent = JSON.stringify(ld);
    document.head.appendChild(script);
  }
});
</script>

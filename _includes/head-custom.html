<script>
document.addEventListener('DOMContentLoaded', function() {
  // Make the site title link to homepage
  var title = document.querySelector('#title h1');
  if (title && !title.querySelector('a')) {
    var link = document.createElement('a');
    link.href = '{{ site.baseurl }}/';
    link.style.color = 'inherit';
    link.style.textDecoration = 'none';
    link.textContent = title.textContent;
    title.textContent = '';
    title.appendChild(link);
  }

  // Replace theme credits with custom footer
  var credits = document.querySelector('#title .credits');
  if (credits) {
    credits.innerHTML = 'Created by <a href="https://tuddenham.info">Alex Tuddenham</a>';
    credits.className = 'credits right';
  }
});
</script>

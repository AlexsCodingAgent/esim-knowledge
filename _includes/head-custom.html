<link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/navy.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/light.css' | relative_url }}">

{% if page.date %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "TechArticle",
  "headline": "{{ page.title | escape }}",
  "description": "{{ page.description | default: page.excerpt | strip_html | escape }}",
  "datePublished": "{{ page.date | date: '%Y-%m-%d' }}",
  "author": {
    "@type": "Person",
    "name": "Alex Tuddenham",
    "url": "https://tuddenham.info"
  },
  "publisher": {
    "@type": "Organization",
    "name": "eUICC.tech",
    "url": "https://euicc.tech"
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ site.url }}{{ page.url }}"
  }
}
</script>
{% endif %}

<!-- Theme Toggle Button -->
<button id="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle theme">☀️</button>
<style>
#theme-toggle {
  position: fixed;
  top: 1rem;
  right: 1rem;
  z-index: 1000;
  background: rgba(93, 173, 226, 0.1);
  border: 1px solid rgba(93, 173, 226, 0.2);
  border-radius: 50%;
  width: 42px;
  height: 42px;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, transform 0.2s;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
#theme-toggle:hover {
  background: rgba(93, 173, 226, 0.2);
  transform: scale(1.08);
}
[data-theme="light"] #theme-toggle {
  background: rgba(0, 0, 0, 0.06);
  border-color: rgba(0, 0, 0, 0.12);
}
[data-theme="light"] #theme-toggle:hover {
  background: rgba(0, 0, 0, 0.1);
}
@media (max-width: 640px) {
  #theme-toggle {
    top: 0.75rem;
    right: 0.75rem;
    width: 38px;
    height: 38px;
    font-size: 1.1rem;
  }
}
</style>

<script>
(function() {
  var STORAGE_KEY = 'euicc-theme';

  function getSavedTheme() {
    try { return localStorage.getItem(STORAGE_KEY); } catch(e) { return null; }
  }

  function getSystemTheme() {
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
      return 'light';
    }
    return 'dark';
  }

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    var btn = document.getElementById('theme-toggle');
    if (btn) {
      btn.textContent = theme === 'light' ? '🌙' : '☀️';
      btn.setAttribute('aria-label', theme === 'light' ? 'Switch to dark mode' : 'Switch to light mode');
    }
  }

  function toggleTheme() {
    var current = document.documentElement.getAttribute('data-theme') || 'dark';
    var next = current === 'light' ? 'dark' : 'light';
    applyTheme(next);
    try { localStorage.setItem(STORAGE_KEY, next); } catch(e) {}
  }

  // Init
  var saved = getSavedTheme();
  var theme = saved || getSystemTheme();
  applyTheme(theme);

  // Wire toggle button
  document.addEventListener('DOMContentLoaded', function() {
    var btn = document.getElementById('theme-toggle');
    if (btn) {
      btn.addEventListener('click', toggleTheme);
    }
  });

  // Listen for system theme changes (if no user preference saved)
  if (!saved && window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function(e) {
      if (!getSavedTheme()) {
        applyTheme(e.matches ? 'light' : 'dark');
      }
    });
  }
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Make title link to homepage
  var title = document.querySelector('#title h1');
  if (title && !title.querySelector('a')) {
    var link = document.createElement('a');
    link.href = '{{ site.baseurl }}/';
    link.style.color = 'inherit';
    link.style.textDecoration = 'none';
    link.textContent = title.textContent;
    title.textContent = '';
    title.appendChild(link);
  }

  // Replace theme credits with custom footer
  var credits = document.querySelectorAll('#title .credits');
  if (credits.length >= 2) {
    credits[0].innerHTML = 'Created by <a href="https://tuddenham.info">Alex Tuddenham</a>';
    credits[1].innerHTML = 'Theme by <a href="https://twitter.com/mattgraham">mattgraham</a>';
    // Report a mistake link
    var mistake = document.createElement('span');
    mistake.className = 'credits';
    var pageTitle = document.title || (document.querySelector('h1') || {}).textContent || 'this page';
    var pageUrl = window.location.href;
    var issueUrl = 'https://github.com/AlexsCodingAgent/esim-knowledge/issues/new'
      + '?title=' + encodeURIComponent('Correction: ' + pageTitle)
      + '&body=' + encodeURIComponent('Page: ' + pageUrl + '\n\n**What needs fixing:**\n\n');
    mistake.innerHTML = ' &middot; <a href="' + issueUrl + '">Report a mistake</a>';
    credits[1].parentNode.appendChild(mistake);
  }

  // Build JSON-LD BreadcrumbList from URL path
  var path = window.location.pathname.replace(/\/$/, '');
  var segments = path.split('/').filter(function(s) { return s.length > 0; });
  var url = 'https://euicc.tech';
  var items = [{ '@type': 'ListItem', 'position': 1, 'name': 'eUICC.tech', 'item': url + '/' }];

  // Map directory segments to readable names
  var dirNames = {
    'docs': 'Documentation',
    'articles': 'Articles',
    'sgp02': 'SGP.02 M2M eSIM',
    'sgp22': 'SGP.22 Consumer RSP',
    'sgp22-v3': 'SGP.22 v3 Unified RSP',
    'sgp23': 'SGP.23 RSP Testing',
    'sgp23-1': 'SGP.23-1 eUICC Testing',
    'sgp25': 'SGP.25 eUICC Security',
    'sgp26': 'SGP.26 Test Certificates',
    'sgp29': 'SGP.29 EID',
    'sgp32': 'SGP.32 IoT eSIM',
    'sgp33-3': 'SGP.33 eIM Testing',
    'sgp41': 'SGP.41 IFPP',
    'kids': 'Illustrated Guides'
  };

  for (var i = 0; i < segments.length; i++) {
    var seg = segments[i];
    // Skip if it's the final .html or .md file (the article itself)
    if (i === segments.length - 1 && (seg.endsWith('.html') || seg.endsWith('.md'))) {
      // Use the page title or H1 as the last breadcrumb name
      var h1 = document.querySelector('h1');
      var pageName = h1 ? h1.textContent.trim() : seg.replace(/\.(html|md)$/, '').replace(/-/g, ' ');
      // Truncate long titles
      if (pageName.length > 80) pageName = pageName.substring(0, 77) + '...';
      url += '/' + seg;
      items.push({ '@type': 'ListItem', 'position': i + 2, 'name': pageName, 'item': url });
    } else if (dirNames[seg]) {
      url += '/' + seg;
      items.push({ '@type': 'ListItem', 'position': i + 2, 'name': dirNames[seg], 'item': url });
    }
  }

  // Only inject if we have more than just the home item
  if (items.length > 1) {
    var ld = {
      '@context': 'https://schema.org',
      '@type': 'BreadcrumbList',
      'itemListElement': items
    };
    var script = document.createElement('script');
    script.type = 'application/ld+json';
    script.textContent = JSON.stringify(ld);
    document.head.appendChild(script);
  }
});
</script>
